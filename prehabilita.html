<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="PreHabilita: programa domiciliario y autogestionado de prehabilitacion anestesica." />
  <title>PreHabilita &middot; Prehabilitacion anestesica</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AB%81%3C/text%3E%3C/svg%3E" />
  <style>
/* styles.css — PreHabilita */

:root {
  --bg: #f1f5f9;
  --card: #ffffff;
  --ink: #0f172a;
  --muted: #64748b;
  --accent: #0f766e;
  --accent-2: #14b8a6;
  --accent-soft: #ccfbf1;
  --danger: #dc2626;
  --gold: #f59e0b;
  --radius: 18px;
  --shadow: 0 2px 12px rgba(15, 23, 42, .07);
  --shadow-lg: 0 12px 40px rgba(15, 23, 42, .18);
  --nav-h: 68px;
  font-size: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}

#app { max-width: 560px; margin: 0 auto; min-height: 100vh; position: relative; }
.noscript { padding: 2rem; text-align: center; }
.muted { color: var(--muted); }
.small { font-size: .82rem; }

/* ---------- Cabecera ---------- */
.app-header {
  position: sticky; top: 0; z-index: 20;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  padding: max(14px, env(safe-area-inset-top)) 16px 14px;
  border-radius: 0 0 22px 22px;
  box-shadow: var(--shadow);
}
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
.brand-name { font-weight: 800; font-size: 1.15rem; letter-spacing: -.3px; }
.brand-sub { font-size: .8rem; opacity: .9; }
.countdown { text-align: center; background: rgba(255,255,255,.18); border-radius: 14px; padding: 6px 12px; min-width: 74px; backdrop-filter: blur(4px); }
.countdown strong { display: block; font-size: 1.5rem; line-height: 1; font-weight: 800; }
.countdown small { font-size: .62rem; opacity: .9; display: block; }
.countdown.today { background: var(--gold); }
.countdown.neutral { opacity: .8; }

.level-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.level-badge { background: #fff; color: var(--accent); font-weight: 800; font-size: .8rem; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
.level-bar { flex: 1; }
.level-xp { font-size: .66rem; opacity: .9; margin-top: 3px; }
.streak { font-weight: 700; font-size: .95rem; white-space: nowrap; }

/* ---------- Barras de progreso ---------- */
.bar { background: rgba(255,255,255,.28); border-radius: 999px; height: 9px; overflow: hidden; }
.content .bar { background: #e2e8f0; }
.bar span { display: block; height: 100%; border-radius: 999px; background: var(--accent); transition: width .5s cubic-bezier(.2,.8,.2,1); }

/* ---------- Contenido ---------- */
.content { padding: 16px 14px calc(var(--nav-h) + 24px); }
.section-label { font-weight: 800; font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 6px 4px 10px; }

.card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow);
}
.card h2 { font-size: 1.1rem; }
.card h3 { font-size: 1rem; margin-bottom: 8px; }

/* ---------- Objetivo diario ---------- */
.daily-goal.is-complete { outline: 2px solid var(--accent-2); background: linear-gradient(180deg, #f0fdfa, #fff); }
.daily-goal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
.daily-ring {
  width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: 1.5rem; flex-shrink: 0;
  flex-direction: column;
}
.daily-ring small { font-size: .5rem; font-weight: 600; }
.daily-goal-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: .8rem; color: var(--muted); }
.badge-ok { color: var(--accent); font-weight: 700; }

/* ---------- Reto semanal ---------- */
.challenge { border-left: 4px solid var(--gold); }
.challenge-head { display: flex; justify-content: space-between; font-weight: 700; font-size: .92rem; margin-bottom: 8px; gap: 10px; }
.challenge-xp { color: var(--gold); white-space: nowrap; }

/* ---------- Pilares y tareas ---------- */
.pillar-group { padding: 0; overflow: hidden; }
.pillar-head {
  width: 100%; border: 0; background: transparent; cursor: pointer;
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  border-left: 5px solid var(--pc); font: inherit; text-align: left;
}
.pillar-emoji { font-size: 1.3rem; }
.pillar-title { flex: 1; font-weight: 700; }
.pillar-count { font-size: .8rem; color: var(--muted); background: #f1f5f9; padding: 2px 9px; border-radius: 999px; }
.task-list { padding: 0 14px 6px; }

.task { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-top: 1px solid #f1f5f9; }
.task:first-child { border-top: 0; }
.task-check {
  width: 30px; height: 30px; border-radius: 9px; border: 2px solid #cbd5e1; background: #fff;
  cursor: pointer; flex-shrink: 0; font-size: .95rem; color: #fff; font-weight: 800;
  display: grid; place-items: center; transition: all .18s;
}
.task.done .task-check { background: var(--accent-2); border-color: var(--accent-2); }
.task-body { flex: 1; min-width: 0; }
.task-title { font-weight: 700; font-size: .95rem; }
.task-desc { font-size: .8rem; color: var(--muted); margin-top: 2px; }
.task-xp { font-size: .78rem; font-weight: 800; color: var(--accent); background: var(--accent-soft); padding: 3px 8px; border-radius: 999px; flex-shrink: 0; }
.task.done .task-title { color: var(--muted); }

.counter-row { display: flex; align-items: center; gap: 12px; margin: 10px 0 8px; }
.stepper {
  width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid #cbd5e1; background: #fff;
  font-size: 1.3rem; font-weight: 700; cursor: pointer; color: var(--accent); line-height: 1;
}
.stepper:active { transform: scale(.92); }
.counter-val { font-weight: 800; font-size: 1.05rem; }
.counter-val small { font-weight: 500; color: var(--muted); font-size: .78rem; }

/* ---------- Ánimo ---------- */
.mood-row { display: flex; justify-content: space-between; gap: 6px; margin-top: 8px; }
.mood-btn { flex: 1; font-size: 1.6rem; background: #f8fafc; border: 2px solid transparent; border-radius: 12px; padding: 8px 0; cursor: pointer; transition: all .15s; }
.mood-btn.sel { border-color: var(--accent-2); background: var(--accent-soft); transform: scale(1.05); }

/* ---------- Plan ---------- */
.plan-pillar-head { display: flex; gap: 12px; align-items: center; }
.plan-pillar-head h3 { margin: 0; }
.plan-pillar { border-top: 4px solid var(--pc); }
.why { background: #f8fafc; border-radius: 12px; padding: 10px 12px; font-size: .84rem; color: #334155; margin: 10px 0; }
.plan-tasks { list-style: none; }
.plan-tasks li { display: flex; gap: 10px; align-items: center; padding: 9px 0; border-top: 1px solid #f1f5f9; font-size: .88rem; }
.plan-tasks li span:first-child { font-size: 1.2rem; }
.plan-tasks li div { flex: 1; }
.xp-tag { font-size: .72rem; font-weight: 800; color: var(--accent); }

/* ---------- Progreso ---------- */
.chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.chip { background: var(--card); border-radius: 14px; padding: 12px; box-shadow: var(--shadow); display: flex; gap: 8px; align-items: center; }
.chip-ico { font-size: 1.3rem; }
.chip strong { display: block; font-size: 1.2rem; font-weight: 800; line-height: 1; }
.chip small { font-size: .68rem; color: var(--muted); }

.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 8px 0; }
.heat { aspect-ratio: 1; border-radius: 6px; background: #e2e8f0; }
.heat.l0 { background: #e2e8f0; } .heat.l1 { background: #99f6e4; }
.heat.l2 { background: #2dd4bf; } .heat.l3 { background: var(--accent); }
.heat-legend { display: flex; align-items: center; gap: 5px; font-size: .68rem; color: var(--muted); margin-top: 8px; }
.heat-legend i { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }

.mood-history { display: flex; justify-content: space-around; gap: 4px; }
.mh { text-align: center; } .mh span { font-size: 1.5rem; display: block; } .mh small { font-size: .62rem; color: var(--muted); }

.row-btns { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

/* ---------- Botones ---------- */
.btn { border: 0; border-radius: 12px; padding: 12px 16px; font: inherit; font-weight: 700; cursor: pointer; background: #e2e8f0; color: var(--ink); }
.btn.primary { background: var(--accent); color: #fff; }
.btn.primary.big { width: 100%; padding: 15px; font-size: 1.05rem; margin-top: 6px; }
.btn.ghost { background: #f1f5f9; }
.btn.danger { background: var(--danger); color: #fff; }
.btn.danger.ghost { background: #fef2f2; color: var(--danger); }
.btn:active { transform: scale(.97); }

/* ---------- Medallas ---------- */
.badge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.badge { background: var(--card); border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: var(--shadow); }
.badge.locked { opacity: .55; filter: grayscale(.6); }
.badge.unlocked { outline: 2px solid var(--gold); }
.badge-emoji { font-size: 2.2rem; }
.badge-name { font-weight: 800; font-size: .9rem; margin-top: 6px; }
.badge-desc { font-size: .74rem; color: var(--muted); margin-top: 3px; }

/* ---------- Educación ---------- */
.lesson summary { font-weight: 700; cursor: pointer; list-style: none; }
.lesson summary::-webkit-details-marker { display: none; }
.lesson[open] summary { margin-bottom: 8px; color: var(--accent); }
.lesson p { font-size: .88rem; color: #334155; }
.lesson.read summary { color: var(--muted); }
.preop { list-style: none; }
.preop li { padding: 7px 0; border-top: 1px solid #f1f5f9; font-size: .88rem; }
.disclaimer-card { background: #fffbeb; }
.disclaimer-mini { font-size: .72rem; color: var(--muted); text-align: center; margin: 8px 0; cursor: pointer; }

/* ---------- Navegación inferior ---------- */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 560px; height: var(--nav-h);
  background: rgba(255,255,255,.95); backdrop-filter: blur(10px);
  border-top: 1px solid #e2e8f0; display: flex; z-index: 30;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item { flex: 1; border: 0; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--muted); font: inherit; }
.nav-ico { font-size: 1.3rem; }
.nav-lbl { font-size: .66rem; font-weight: 600; }
.nav-item.active { color: var(--accent); }
.nav-item.active .nav-ico { transform: translateY(-1px) scale(1.08); }

/* ---------- Onboarding ---------- */
.onboarding-mode { padding-bottom: 30px; }
.onboarding { padding: 20px 16px; }
.onb-hero { text-align: center; padding: 24px 8px; }
.onb-logo { font-size: 3.5rem; }
.onb-hero h1 { font-size: 2rem; color: var(--accent); letter-spacing: -.5px; }
.onb-hero p { color: var(--muted); margin-top: 8px; }
.onb-form { display: flex; flex-direction: column; gap: 14px; }
.onb-form label { font-weight: 600; font-size: .88rem; display: flex; flex-direction: column; gap: 6px; }
.onb-form input[type=text], .onb-form input[type=date], .onb-form select {
  font: inherit; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 12px; background: #fff; width: 100%;
}
.onb-form input:focus, .onb-form select:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px var(--accent-soft); }
.check-inline { flex-direction: row !important; align-items: center; gap: 8px !important; }
.check-inline input { width: 20px; height: 20px; }

/* ---------- Toasts ---------- */
.toast-layer { position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; max-width: 560px; padding: 0 16px; pointer-events: none; }
.toast {
  background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px; font-weight: 700; font-size: .88rem;
  box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(16px); transition: all .3s cubic-bezier(.2,.8,.2,1); max-width: 100%;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.level { background: linear-gradient(135deg, var(--gold), #f97316); }

/* ---------- Modales ---------- */
.modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 60; display: grid; place-items: center; padding: 20px; animation: fade .2s; }
.modal { background: #fff; border-radius: 20px; padding: 20px; max-width: 420px; width: 100%; box-shadow: var(--shadow-lg); animation: pop .25s cubic-bezier(.2,.8,.2,1); }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.modal-x { border: 0; background: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: .9rem; }
.modal-body p { margin-bottom: 10px; color: #334155; }
.badge-modal { text-align: center; }
.badge-modal .big-emoji { font-size: 4.5rem; animation: bounce .6s; }
.badge-modal h2 { color: var(--gold); }
.badge-modal .btn { margin-top: 14px; }
.confetti { font-size: 2rem; animation: spin 1s; }

@keyframes fade { from { opacity: 0; } }
@keyframes pop { from { transform: scale(.9); opacity: 0; } }
@keyframes bounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-14px);} 60%{transform:translateY(-6px);} }
@keyframes spin { from { transform: rotate(-20deg) scale(.5); opacity:0; } to { transform: rotate(0) scale(1); opacity:1; } }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

@media (min-width: 480px) {
  .chips { grid-template-columns: repeat(3, 1fr); }
}


/* ================= Ampliación: editor, recursos, blog, gráficas ================= */

body.reduce-motion * { animation: none !important; transition: none !important; }

.btn.block { width: 100%; display: block; text-align: center; margin-bottom: 12px; }
.back-btn { display: inline-block; margin-bottom: 12px; }

/* ---------- Gráficas ---------- */
.chart { width: 100%; height: auto; display: block; }
.chart-empty { padding: 20px; text-align: center; color: var(--muted); font-size: .85rem; }

/* ---------- Recursos / vídeos ---------- */
.resource-title { font-weight: 700; margin-bottom: 6px; }
.video { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
.video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
.empty-state { text-align: center; }
.empty-emoji { font-size: 3rem; }
.empty-state .btn { margin-top: 12px; }

/* ---------- Blog ---------- */
.post-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 6px; }
.post-card { display: flex; gap: 12px; align-items: center; text-align: left; background: var(--card); border: 0; border-radius: 16px; padding: 10px; box-shadow: var(--shadow); cursor: pointer; font: inherit; width: 100%; }
.post-card:active { transform: scale(.99); }
.post-cover { width: 64px; height: 64px; border-radius: 12px; background-size: cover; background-position: center; flex-shrink: 0; background-color: var(--accent-soft); }
.post-cover.ph { display: grid; place-items: center; font-size: 1.8rem; }
.post-info { flex: 1; min-width: 0; }
.post-info strong { display: block; }
.post-card.read { opacity: .72; }
.post-full { }
.post-cover-full { width: 100%; height: 170px; border-radius: 12px; background-size: cover; background-position: center; margin-bottom: 12px; }
.post-tag { display: inline-block; background: var(--accent-soft); color: var(--accent); font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
.post-full h2 { margin: 8px 0 4px; }
.post-body { margin-top: 12px; color: #334155; line-height: 1.6; }

/* ---------- Menú Más ---------- */
.more-menu { padding: 4px 0; }
.more-item { width: 100%; border: 0; background: transparent; display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; font: inherit; text-align: left; border-top: 1px solid #f1f5f9; }
.more-item:first-child { border-top: 0; }
.more-ico { font-size: 1.4rem; }
.more-txt { flex: 1; } .more-txt strong { display: block; } .more-txt small { font-size: .76rem; }
.more-arrow { color: #cbd5e1; font-size: 1.4rem; }

/* ---------- Editor ---------- */
.editor-intro { margin: -4px 4px 12px; }
.editor-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
.etab { flex: 1; white-space: nowrap; border: 0; background: #e2e8f0; color: var(--ink); border-radius: 10px; padding: 9px 8px; font: inherit; font-weight: 700; font-size: .8rem; cursor: pointer; }
.etab.active { background: var(--accent); color: #fff; }

.etask-group-head { font-weight: 800; border-left: 4px solid var(--pc); padding-left: 8px; margin-bottom: 8px; }
.etask, .eres { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #f1f5f9; }
.etask:first-child, .eres:first-child { border-top: 0; }
.etask.off { opacity: .5; }
.etask-main, .eres-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.etask-main small, .eres-main small { font-size: .72rem; }
.eres-ico { font-size: 1.2rem; }
.etask-actions { display: flex; gap: 4px; }
.mini-btn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: .95rem; }
.mini-btn.danger { border-color: #fecaca; background: #fef2f2; }

/* ---------- Formularios apilados ---------- */
.stack-form { display: flex; flex-direction: column; gap: 12px; }
.stack-form label { font-weight: 600; font-size: .86rem; display: flex; flex-direction: column; gap: 6px; }
.stack-form input[type=text], .stack-form input[type=url], .stack-form input[type=number], .stack-form input[type=date], .stack-form select, .stack-form textarea {
  font: inherit; padding: 11px; border: 1.5px solid #cbd5e1; border-radius: 10px; background: #fff; width: 100%;
}
.stack-form textarea { resize: vertical; }
.stack-form input:focus, .stack-form select:focus, .stack-form textarea:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px var(--accent-soft); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ---------- Ajustes ---------- */
.goal-setter { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 8px; }
.switch-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 6px 0; font-weight: 600; font-size: .9rem; }
.switch-row input[type=checkbox] { width: 44px; height: 26px; appearance: none; -webkit-appearance: none; background: #cbd5e1; border-radius: 999px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.switch-row input[type=checkbox]:checked { background: var(--accent-2); }
.switch-row input[type=checkbox]::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .2s; }
.switch-row input[type=checkbox]:checked::after { transform: translateX(18px); }
.times-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
.time-chip { background: var(--accent-soft); color: var(--accent); font-weight: 700; padding: 5px 8px 5px 12px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; }
.time-chip button { border: 0; background: rgba(15,118,110,.15); width: 20px; height: 20px; border-radius: 50%; cursor: pointer; color: var(--accent); font-size: .7rem; }
.add-time-row { display: flex; gap: 8px; align-items: center; }
.add-time-row input[type=time] { font: inherit; padding: 9px; border: 1.5px solid #cbd5e1; border-radius: 10px; }
.file-btn { position: relative; overflow: hidden; }
.pin-input { font: inherit; font-size: 1.6rem; letter-spacing: 8px; text-align: center; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; width: 100%; margin: 8px 0; }
.pin-input.shake { animation: shake .3s; border-color: var(--danger); }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }


/* ================= Ampliación: fragilidad, cuidador, accesibilidad, juego ================= */

/* ---------- Accesibilidad ---------- */
html.large-text { font-size: 19px; }
body.high-contrast { --ink: #000; --muted: #1f2937; }
body.high-contrast .card { border: 1.5px solid #0f172a; }
body.high-contrast .task-desc, body.high-contrast .muted, body.high-contrast small { color: #1f2937 !important; }
body.high-contrast .btn.ghost { border: 1.5px solid #0f172a; }

/* ---------- Botón escuchar (TTS) ---------- */
.speak-btn { margin-top: 10px; font-size: .85rem; padding: 8px 14px; }

/* ---------- Para el cuidador ---------- */
.ctips { display: flex; flex-direction: column; gap: 14px; }
.ctip { display: flex; gap: 12px; align-items: flex-start; }
.ctip-ico { font-size: 1.5rem; flex-shrink: 0; }
.ctip strong { display: block; }
.alarm-card { background: #fef2f2; border-left: 5px solid var(--danger); }
.alarm-card h3 { color: var(--danger); }
.alarm-list { margin: 8px 0 0 1.1rem; }
.alarm-list li { padding: 5px 0; font-size: .9rem; }

/* ---------- Cribado FRAIL ---------- */
.frail-result { text-align: center; border-top: 5px solid var(--fc); }
.frail-emoji { font-size: 2.6rem; }
.frail-score { font-size: 1.8rem; font-weight: 800; color: var(--fc); }
.frail-score small { font-size: .9rem; color: var(--muted); font-weight: 600; }
.frail-label { font-weight: 800; margin-bottom: 8px; }
.frail-q { padding: 12px 0; border-top: 1px solid #f1f5f9; }
.frail-q:first-of-type { border-top: 0; }
.frail-opts { display: flex; gap: 20px; margin-top: 8px; }
.fopt { display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; }
.fopt input { width: 20px; height: 20px; }

/* ---------- Medicación ---------- */
.med-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #f1f5f9; }
.med-row:first-child { border-top: 0; }
.print-doc { background: #fff; border: 1px dashed #cbd5e1; border-radius: 14px; padding: 18px; margin-top: 12px; }
.print-doc h2 { font-size: 1.2rem; margin-bottom: 8px; }
.print-doc h3 { font-size: .95rem; margin: 14px 0 4px; color: var(--accent); }
.med-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.med-table th, .med-table td { border: 1px solid #e2e8f0; padding: 7px 8px; text-align: left; font-size: .85rem; }
.med-table th { background: #f8fafc; }
.doc-foot { margin-top: 16px; font-size: .72rem; color: var(--muted); }

/* ---------- Juego de memoria ---------- */
.game-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.mini-exit { padding: 6px 14px; }
.mgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.mcard {
  aspect-ratio: 1; border: 0; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
  font-size: 2rem; display: grid; place-items: center; transition: transform .15s, background .2s;
}
.mcard.up { background: #fff; border: 2px solid var(--accent-2); }
.mcard.matched { background: var(--accent-soft); opacity: .65; }
.mcard:active { transform: scale(.94); }
.mcard:disabled { cursor: default; }
.game-done { text-align: center; }
.game-done .big-emoji { font-size: 3rem; }

/* ---------- Impresión (guardar como PDF) ---------- */
@media print {
  .app-header, .bottom-nav, .toast-layer, .no-print, .section-label { display: none !important; }
  #modal-root { display: none !important; }
  body { background: #fff; }
  #app { max-width: none; }
  .content { padding: 0; }
  .print-doc { border: 0; padding: 0; margin: 0; }
  .med-table th, .med-table td { border: 1px solid #333; }
}


/* ================= Ampliación v3: fases, perfiles, informe, idioma ================= */

/* ---------- Banner de fase (plan adaptativo) ---------- */
.phase-banner { border-left: 5px solid var(--pc); }
.phase-head { display: flex; align-items: center; gap: 10px; }
.phase-emoji { font-size: 1.6rem; }
.phase-title { display: block; font-size: 1.05rem; }
.phase-focus { margin-top: 8px; font-size: .9rem; color: #334155; }

/* ---------- Selector de idioma ---------- */
.lang-select {
  font: inherit; padding: 11px; border: 1.5px solid #cbd5e1; border-radius: 10px;
  background: #fff; width: 100%; margin-top: 4px;
}
.lang-select:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---------- Perfiles ---------- */
.prof-list { display: flex; flex-direction: column; }
.prof-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 0; border-top: 1px solid #f1f5f9; }
.prof-row:first-child { border-top: 0; }
.prof-row.active { }
.prof-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.prof-badge { font-size: .68rem; font-weight: 800; background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 999px; }
.prof-actions { display: flex; gap: 4px; }

/* ---------- Informe: medallas ---------- */
.rep-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.rep-badge { font-size: .78rem; background: #f1f5f9; padding: 3px 8px; border-radius: 999px; }

/* Alto contraste: refuerzos extra para banners y chips */
body.high-contrast .phase-focus { color: #111827; }


/* ---------- Aviso de protección del Modo médico ---------- */
.ed-warn { background: #fffbeb; border-left: 5px solid var(--gold); }
.ed-warn p { font-size: .88rem; color: #334155; margin-bottom: 10px; }
.ed-protected { text-align: center; color: var(--accent); font-weight: 700; font-size: .85rem; background: var(--accent-soft); padding: 8px; border-radius: 10px; margin-bottom: 12px; }


/* ---------- Lecciones ampliadas ---------- */
.lesson-body { font-size: .9rem; color: #334155; line-height: 1.6; }
.lesson[open] .lesson-body { margin-top: 6px; }


/* ---------- Escala de Edmonton (opciones apiladas) ---------- */
.efs-q { padding: 14px 0; }
.efs-opts { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.efs-opt { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: .9rem; }
.efs-opt:hover { border-color: var(--accent-2); }
.efs-opt input { width: 20px; height: 20px; flex-shrink: 0; margin: 0; }


/* ================= Evaluaciones (hub + comparación) ================= */
.assess-list { padding: 4px 0; }
.assess-row { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-top: 1px solid #f1f5f9; }
.assess-row:first-child { border-top: 0; }
.assess-ico { font-size: 1.5rem; flex-shrink: 0; }
.assess-main { flex: 1; min-width: 0; }
.assess-main > strong { display: block; }
.mini-do { padding: 8px 12px; font-size: .82rem; white-space: nowrap; }
.cmp-inline { font-size: .8rem; font-weight: 700; margin-top: 4px; }
.assess-main .cmp-inline { margin-top: 2px; }
.cmp-up { color: #16a34a; }
.cmp-down { color: #dc2626; }
.cmp-same { color: var(--muted); }
.reeval-card { background: linear-gradient(180deg, #fffbeb, #fff); border-left: 5px solid var(--gold); }
.reeval-card p { font-size: .9rem; margin-bottom: 10px; color: #334155; }
body.high-contrast .cmp-up { color: #15803d; }
body.high-contrast .cmp-down { color: #b91c1c; }

  // js/ui.js
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }
  function formatBody(body) {
    return esc(body).replace(/\n/g, "<br>");
  }
  function disc() {
    return getLang() === "en" ? DISCLAIMER_EN : DISCLAIMER;
  }
  function erasNote() {
    return getLang() === "en" ? ERAS_NOTE_EN : ERAS_NOTE;
  }
  function daysToSurgery(state2) {
    const d = state2.profile.surgeryDate;
    if (!d)
      return null;
    return daysBetween(d, todayKey());
  }
  function progressBar(pct, color = "var(--accent)") {
    const p = Math.max(0, Math.min(100, Math.round(pct)));
    return `<div class="bar"><span style="width:${p}%;background:${color}"></span></div>`;
  }
  function statChip(icon, value, label) {
    return `<div class="chip"><span class="chip-ico">${icon}</span><div><strong>${esc(value)}</strong><small>${esc(label)}</small></div></div>`;
  }
  function renderHeader(state2) {
    const li = levelInfo(state2.stats.xp);
    const dts = daysToSurgery(state2);
    let countdown = "";
    if (dts === null) {
      countdown = `<div class="countdown neutral"><strong>—</strong><small>${t("date_unset")}</small></div>`;
    } else if (dts > 0) {
      countdown = `<div class="countdown"><strong>${dts}</strong><small>${t("days_to_surgery", { s: dts === 1 ? "" : getLang() === "en" ? "s" : "s" })}</small></div>`;
    } else if (dts === 0) {
      countdown = `<div class="countdown today"><strong>${t("today")}</strong><small>${t("its_the_day")}</small></div>`;
    } else {
      countdown = `<div class="countdown neutral"><strong>+${Math.abs(dts)}</strong><small>${t("post_surgery")}</small></div>`;
    }
    return `
  <header class="app-header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-logo">\uD83E\uDEC1</span>
        <div>
          <div class="brand-name">PreHabilita</div>
          <div class="brand-sub">${t("greeting", { name: esc(state2.profile.name || t("patient_default")) })}</div>
        </div>
      </div>
      ${countdown}
    </div>
    <div class="level-row">
      <div class="level-badge">${t("level_abbr")} ${li.level}</div>
      <div class="level-bar">
        ${progressBar(li.progress * 100)}
        <div class="level-xp">${li.into} / ${li.span} XP</div>
      </div>
      <div class="streak" title="${t("streak_title")}">\uD83D\uDD25 ${state2.stats.streak}</div>
    </div>
  </header>`;
  }
  function phaseBanner(state2) {
    const dts = daysToSurgery(state2);
    const ph = getPhase(dts);
    return `
    <section class="card phase-banner" style="--pc:${ph.color}">
      <div class="phase-head"><span class="phase-emoji">${ph.emoji}</span>
        <div><small class="muted">${t("phase_label")}</small><strong class="phase-title">${esc(tr(ph, "title"))}</strong></div>
      </div>
      <p class="phase-focus">${esc(tr(ph, "focus"))}</p>
    </section>`;
  }
  function reevalBanner(state2) {
    const dts = daysToSurgery(state2);
    if (dts == null || dts < 0 || dts > 3)
      return "";
    const hasBaseline = SCALE_LIST.some((sc) => assessmentHistory(sc.id).length > 0);
    if (!hasBaseline)
      return "";
    return `<section class="card reeval-card">
    <p>${t("assess_reeval_soon")}</p>
    <button class="btn primary block" data-action="nav" data-view="evaluaciones">${t("m_assess")}</button>
  </section>`;
  }
  function renderToday(state2) {
    const tasks = getTasks(state2);
    const goal = getDailyGoal(state2);
    const dayLog = state2.logs[todayKey()] || { tasks: {} };
    const xp = dayXp(dayLog, tasks);
    const complete = isDayComplete(dayLog, tasks, goal);
    const doneN = tasksDoneCount(dayLog, tasks);
    const goalPct = xp / goal * 100;
    const wc = getWeeklyChallenge(state2);
    const pillars = getPillars(state2);
    const dailyCard = `
    <section class="card daily-goal ${complete ? "is-complete" : ""}">
      <div class="daily-goal-head">
        <div>
          <h2>${t("today_title")}</h2>
          <p class="muted">${complete ? t("goal_reached") : t("add_more_xp", { n: Math.max(0, goal - xp) })}</p>
        </div>

  function renderTaskItem(tk, dayLog) {

    <div class="task counter ${done ? "done" : ""}">

  function renderProgress(state2, charts) {

    const chips = `
    <div class="chips">
      ${statChip("⭐", li.level, t("st_level"))}

      ${statChip("\uD83C\uDF96️", state2.badges.length, t("st_medals"))}
    </div>`;
    const lineData = [];
    for (let i = 13;i >= 0; i--) {
      const d = new Date;
      d.setDate(d.getDate() - i);
      const key = todayKey(d);
      const log = state2.logs[key];
      lineData.push({ label: key.slice(8) + "/" + key.slice(5, 7), value: log ? dayXp(log, tasks) : 0 });
    }
    const lineCard = `<section class="card"><h3>${t("chart_xp")}</h3>${charts.lineChart(lineData, { color: "#0f766e" })}</section>`;
    const pillars = getPillars(state2);
    const barData = pillars.map((p) => {
      const pt = tasks.filter((x) => x.pillar === p.id);
      if (pt.length === 0)
        return null;
      let done = 0, possible = 0;
      for (let i = 6;i >= 0; i--) {
        const d = new Date;
        d.setDate(d.getDate() - i);
        const log = state2.logs[todayKey(d)];
        possible += pt.length;
        if (log)
          done += pt.filter((x) => taskIsDone(x, log)).length;
      }
      const pctv = possible ? Math.round(done / possible * 100) : 0;
      return { label: p.emoji, value: pctv, color: p.color, sub: pctv + "%" };
    }).filter(Boolean);
    const barCard = `<section class="card"><h3>${t("chart_adh")}</h3>${charts.barChart(barData)}</section>`;
    const cells = [];
    for (let i = 20;i >= 0; i--) {
      const d = new Date;
      d.setDate(d.getDate() - i);
      const key = todayKey(d);
      const log = state2.logs[key];
      const xp = log ? dayXp(log, tasks) : 0;
      const lvl = xp === 0 ? 0 : xp >= goal ? 3 : xp >= goal / 2 ? 2 : 1;
      cells.push(`<div class="heat l${lvl}" title="${key}: ${xp} XP"></div>`);
    }
    const heat = `<section class="card"><h3>${t("consistency")}</h3><div class="heatmap">${cells.join("")}</div>
    <div class="heat-legend"><span>${t("less")}</span><i class="heat l0"></i><i class="heat l1"></i><i class="heat l2"></i><i class="heat l3"></i><span>${t("more")}</span></div></section>`;
    const moodLogs = Object.entries(state2.logs).filter(([, l]) => l.mood).sort((a, b) => a[0].localeCompare(b[0])).slice(-7);
    const moodEmoji = ["", "\uD83D\uDE23", "\uD83D\uDE15", "\uD83D\uDE10", "\uD83D\uDE42", "\uD83D\uDE04"];
    const moodRow = moodLogs.length ? `<section class="card"><h3>${t("recent_mood")}</h3><div class="mood-history">${moodLogs.map(([k, l]) => `<div class="mh"><span>${moodEmoji[l.mood]}</span><small>${k.slice(5)}</small></div>`).join("")}</div></section>` : "";
    const reportBtn = `<button class="btn ghost block" data-action="nav" data-view="report">${t("report_btn")}</button>`;

  function esc2(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  }
  function lineChart(data, opts = {}) {
    const W = 320, H = 150, padL = 28, padR = 8, padT = 12, padB = 22;
    const color = opts.color || "#0f766e";
    if (!data || data.length === 0)
      return emptyChart();
    const max = Math.max(1, ...data.map((d) => d.value));
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    const stepX = data.length > 1 ? innerW / (data.length - 1) : 0;
    const x = (i) => padL + i * stepX;
    const y = (v) => padT + innerH - v / max * innerH;
    const linePts = data.map((d, i) => `${x(i).toFixed(1)},${y(d.value).toFixed(1)}`).join(" ");
    const areaPts = `${padL},${padT + innerH} ${linePts} ${x(data.length - 1)},${padT + innerH}`;
    const grid = [0, 0.5, 1].map((f) => {
      const gy = padT + innerH - f * innerH;
      return `<line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#e2e8f0" stroke-width="1"/>
      <text x="2" y="${gy + 3}" font-size="8" fill="#94a3b8">${Math.round(max * f)}</text>`;
    }).join("");
    const dots = data.map((d, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(d.value).toFixed(1)}" r="2.4" fill="${color}"><title>${esc2(d.label)}: ${d.value}</title></circle>`).join("");
    const idxs = data.length <= 1 ? [0] : [0, Math.floor((data.length - 1) / 2), data.length - 1];
    const xlabels = idxs.map((i) => `<text x="${x(i).toFixed(1)}" y="${H - 6}" font-size="8" fill="#94a3b8" text-anchor="middle">${esc2(data[i].label)}</text>`).join("");
    return `<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Gráfica de evolución">
    ${grid}
    <polygon points="${areaPts}" fill="${color}" fill-opacity="0.12"/>
    <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${xlabels}
  </svg>`;
  }
  function barChart(data, opts = {}) {
    const W = 320, H = 160, padL = 8, padR = 8, padT = 12, padB = 34;
    if (!data || data.length === 0)
      return emptyChart();
    const max = Math.max(1, ...data.map((d) => d.value));
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    const gap = 10;
    const bw = (innerW - gap * (data.length - 1)) / data.length;
    const bars = data.map((d, i) => {
      const bh = d.value / max * innerH;
      const bx = padL + i * (bw + gap);
      const by = padT + innerH - bh;
      const col = d.color || "#0f766e";
      return `
      <rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, bh).toFixed(1)}" rx="4" fill="${col}"><title>${esc2(d.label)}: ${d.value}</title></rect>
      <text x="${(bx + bw / 2).toFixed(1)}" y="${(by - 3).toFixed(1)}" font-size="9" fill="#334155" text-anchor="middle" font-weight="700">${esc2(d.sub ?? d.value)}</text>
      <text x="${(bx + bw / 2).toFixed(1)}" y="${H - 18}" font-size="8.5" fill="#64748b" text-anchor="middle">${esc2(d.label)}</text>`;
    }).join("");
    return `<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Gráfica de barras">${bars}</svg>`;
  }

      if (tm === hhmm && !rem.notified[key]) {
        rem.notified[key] = true;
        saveState();
        fireReminder();
      }
    }
  }
  function fireReminder() {
    const state2 = getState();
    const tasks = getTasks(state2);
    const goal = getDailyGoal(state2);
    const log = state2.logs[todayKey()] || { tasks: {} };
    const xp = dayXp(log, tasks);
    const doneN = tasksDoneCount(log, tasks);
    const pending = tasks.length - doneN;
    let body;
    if (xp >= goal)
      body = "¡Ya has completado tu objetivo de hoy! \uD83C\uDF89 ¿Sumamos algo extra?";
    else
      body = `Te quedan ${pending} tareas (${Math.max(0, goal - xp)} XP) para completar tu día. ¡Tú puedes! \uD83D\uDCAA`;
    try {
      new Notification("PreHabilita · tu prehabilitación te espera", { body, tag: "prehabilita-reminder" });
    } catch (_) {}
  }
  function speakFrom(el) {
    const synth = window.speechSynthesis;
    if (!synth) {
      toast(L2("Tu navegador no permite lectura por voz.", "Your browser does not support text-to-speech."));
      return;
    }
    if (synth.speaking || synth.pending) {
      synth.cancel();
      toast(L2("Lectura detenida.", "Reading stopped."));
      return;
    }
    const scope = el.closest("[data-speak-scope]") || el.parentElement;
    const target = scope && scope.querySelector(".speakable") || scope;
    const text = (target.innerText || target.textContent || "").trim();
    if (!text)
      return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = getLang() === "en" ? "en-US" : "es-ES";
    u.rate = 0.95;
    synth.speak(u);
    toast(L2("\uD83D\uDD0A Leyendo… (toca de nuevo para parar)", "\uD83D\uDD0A Reading… (tap again to stop)"));
  }
  function submitFrail(form) {
    const fd = new FormData(form);
    const state2 = getState();
    let score = 0;
    const answers = {};
    for (const q of FRAIL_QUESTIONS) {
      const v = fd.get(q.id);
      if (v == null) {
        toast(L2("Responde a todas las preguntas, por favor.", "Please answer all the questions."));
        return;
      }
      const n = Number(v);
      answers[q.id] = n;
      score += n;
    }
    state2.frail = { score, date: todayKey(), answers };
    recordAssessment("frail", score, answers);
    render();
    window.scrollTo(0, 0);
    toast(L2("✔ Cribado guardado. Compártelo con tu equipo médico.", "✔ Screening saved. Share it with your medical team."));
  }
  function submitEdmonton(form) {
    const fd = new FormData(form);
    const state2 = getState();
    let score = 0;
    const answers = {};
    for (const q of EDMONTON_QUESTIONS) {
      const v = fd.get(q.id);
      if (v == null) {
        toast(L2("Responde a todas las preguntas, por favor.", "Please answer all the questions."));

      }

      score += n;

  function submitFreqScale(form, scaleId) {
    const scale = scaleId === "phq9" ? PHQ9 : GAD7;
    const fd = new FormData(form);
    let score = 0;
    const answers = {};
    for (let i = 0;i < scale.items.length; i++) {
      const v = fd.get("q" + i);
      if (v == null) {
        toast(L2("Responde a todas las preguntas, por favor.", "Please answer all the questions."));
        return;
      }
      const n = Number(v);
      answers[i] = n;
      score += n;
    }
    recordAssessment(scaleId, score, answers);
    render();
    window.scrollTo(0, 0);
    toast(L2("✔ Guardado. Compártelo con tu equipo médico.", "✔ Saved. Share it with your medical team."));
    if (scaleId === "phq9" && answers[PHQ9.selfHarmIndex] > 0) {
      setTimeout(() => openModal(t("phq9_safety_title"), `<p>${esc(t("phq9_safety"))}</p>`), 450);
    }
  }
  function submitDasi(form) {
    const fd = new FormData(form);
    let score = 0;
    const answers = {};
    for (let i = 0;i < DASI.items.length; i++) {
      const v = fd.get("q" + i);
      if (v == null) {
        toast(L2("Responde a todas las preguntas, por favor.", "Please answer all the questions."));
        return;
      }
      const n = Number(v);
      answers[i] = n;
      if (n === 1)
        score += DASI.items[i].w;
    }
    score = Math.round(score * 100) / 100;
    recordAssessment("dasi", score, answers);
    render();
    window.scrollTo(0, 0);
    toast(L2("✔ Guardado.", "✔ Saved."));
  }
  function submitMust(form) {
    const fd = new FormData(form);
    const weight = Number(fd.get("weight"));
    const height = Number(fd.get("height"));
    const wl = Number(fd.get("wl")) || 0;
    const acute = fd.get("acute") === "on" ? 2 : 0;
    if (!weight || !height) {
      toast(L2("Introduce tu peso y tu estatura.", "Enter your weight and height."));
      return;
    }
    const bmi = weight / Math.pow(height / 100, 2);
    const score = bmiScore(bmi) + wl + acute;
    recordAssessment("must", score, { weight, height, wl, acute: acute > 0, bmi: Math.round(bmi * 10) / 10 });
    render();
    window.scrollTo(0, 0);
    toast(L2("✔ Guardado.", "✔ Saved."));
  }
  function submitMed(form) {
    const fd = new FormData(form);
    const state2 = getState();
    const name = (fd.get("name") || "").toString().trim();
    if (!name)
      return;
    state2.medList.meds.push({
      name,
      dose: (fd.get("dose") || "").toString().trim(),
      freq: (fd.get("freq") || "").toString().trim()
    });
    saveState();
    render();
    toast(L2("✔ Medicamento añadido.", "✔ Medication added."));
  }
  function delMed(idx) {
    const state2 = getState();
    state2.medList.meds.splice(idx, 1);
    saveState();
    render();
  }
  function submitMedExtra(form) {
    const fd = new FormData(form);
    const state2 = getState();
    state2.medList.allergies = (fd.get("allergies") || "").toString().trim();
    state2.medList.notes = (fd.get("notes") || "").toString().trim();

    toast(L2("✔ Guardado.", "✔ Saved."));
  }
  function startMemory(pairs) {
    const n = Math.max(2, Math.min(MEMORY_EMOJIS.length, pairs || 6));
    const chosen = MEMORY_EMOJIS.slice(0, n);
    const deck = [...chosen, ...chosen].map((e) => ({ emoji: e, matched: false }));
    for (let i = deck.length - 1;i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    memoryGame = { cards: deck, flipped: [], moves: 0, locked: false, done: false };
    route = "juego";
    render();
    window.scrollTo(0, 0);
  }
  function flipCard(idx) {
    const g = memoryGame;
    if (!g || g.locked || g.done)
      return;
    const card = g.cards[idx];
    if (!card || card.matched || g.flipped.includes(idx))
      return;
    g.flipped.push(idx);
    if (g.flipped.length < 2) {
      render();
      return;
    }
    g.moves++;
    const [a, b] = g.flipped;
    if (g.cards[a].emoji === g.cards[b].emoji) {
      g.cards[a].matched = true;
      g.cards[b].matched = true;
      g.flipped = [];
      if (g.cards.every((c) => c.matched))
        finishMemory();
      render();
    } else {
      g.locked = true;
      render();
      setTimeout(() => {
        g.flipped = [];
        g.locked = false;
        render();
      }, 900);
    }
  }
  function finishMemory() {
    const g = memoryGame;
    g.done = true;
    const state2 = getState();
    state2.games = state2.games || { memory: { wins: 0, bestMoves: null } };
    const mem = state2.games.memory;
    mem.wins = (mem.wins || 0) + 1;
    if (mem.bestMoves == null || g.moves < mem.bestMoves)
      mem.bestMoves = g.moves;
    const log = getDayLog();
    const wasDone = log.tasks["gimnasia-mental"] === true;
    log.tasks["gimnasia-mental"] = true;
    const events = applyEngine(state2);
    saveState();
    if (!wasDone)
      setTimeout(() => toast(L2("\uD83E\uDDE9 +15 XP · gimnasia mental completada", "\uD83E\uDDE9 +15 XP · brain training completed")), 200);
    handleEvents(events);
  }
  function registerServiceWorker() {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
