<!DOCTYPE html>
<html lang="es">

  <meta charset="UTF-8" />

  <title>PreHabilítame · Prehabilitación anestésica</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AB%81%3C/text%3E%3C/svg%3E" />
  <style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Roboto:wght@400;500&display=swap');

/* styles.css — PreHabilítame
   Identidad visual alineada con Vithas: tipografía Barlow/Roboto y
   paleta corporativa (azul #0027c2). */

:root {
  --bg: #f2f4f8;
  --card: #ffffff;
  --ink: #21272a;
  --muted: #697077;
  --accent: #0027c2;
  --accent-2: #001a80;
  --accent-soft: #e0f2ff;
  --danger: #dc2626;
  --gold: #f59e0b;
  --radius: 18px;
  --shadow: 0 2px 12px rgba(0, 26, 128, .08);
  --shadow-lg: 0 12px 40px rgba(0, 26, 128, .16);
  --nav-h: 68px;
  font-size: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}

#app { max-width: 560px; margin: 0 auto; min-height: 100vh; position: relative; }
.noscript { padding: 2rem; text-align: center; }
.muted { color: var(--muted); }
.small { font-size: .82rem; }

/* ---------- Cabecera ---------- */
.app-header {
  position: sticky; top: 0; z-index: 20;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  padding: max(14px, env(safe-area-inset-top)) 16px 14px;
  border-radius: 0 0 22px 22px;
  box-shadow: var(--shadow);
}
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
.brand-name { font-weight: 800; font-size: 1.15rem; letter-spacing: -.3px; }
.brand-sub { font-size: .8rem; opacity: .9; }
.countdown { text-align: center; background: rgba(255,255,255,.18); border-radius: 14px; padding: 6px 12px; min-width: 74px; backdrop-filter: blur(4px); }
.countdown strong { display: block; font-size: 1.5rem; line-height: 1; font-weight: 800; }
.countdown small { font-size: .62rem; opacity: .9; display: block; }
.countdown.today { background: var(--gold); }
.countdown.neutral { opacity: .8; }

.level-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.level-badge { background: #fff; color: var(--accent); font-weight: 800; font-size: .8rem; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
.level-bar { flex: 1; }
.level-xp { font-size: .66rem; opacity: .9; margin-top: 3px; }
.streak { font-weight: 700; font-size: .95rem; white-space: nowrap; }

/* ---------- Barras de progreso ---------- */
.bar { background: rgba(255,255,255,.28); border-radius: 999px; height: 9px; overflow: hidden; }
.content .bar { background: #e2e8f0; }
.bar span { display: block; height: 100%; border-radius: 999px; background: var(--accent); transition: width .5s cubic-bezier(.2,.8,.2,1); }

/* ---------- Contenido ---------- */
.content { padding: 16px 14px calc(var(--nav-h) + 24px); }
.section-label { font-weight: 800; font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 6px 4px 10px; }

.card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow);
}
.card h2 { font-size: 1.1rem; }
.card h3 { font-size: 1rem; margin-bottom: 8px; }

/* ---------- Objetivo diario ---------- */
.daily-goal.is-complete { outline: 2px solid var(--accent-2); background: linear-gradient(180deg, #f0fdfa, #fff); }
.daily-goal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
.daily-ring {
  width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent); font-weight: 800; font-size: 1.5rem; flex-shrink: 0;
  flex-direction: column;
}
.daily-ring small { font-size: .5rem; font-weight: 600; }
.daily-goal-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: .8rem; color: var(--muted); }
.badge-ok { color: var(--accent); font-weight: 700; }

/* ---------- Reto semanal ---------- */
.challenge { border-left: 4px solid var(--gold); }
.challenge-head { display: flex; justify-content: space-between; font-weight: 700; font-size: .92rem; margin-bottom: 8px; gap: 10px; }
.challenge-xp { color: var(--gold); white-space: nowrap; }

/* ---------- Pilares y tareas ---------- */
.pillar-group { padding: 0; overflow: hidden; }
.pillar-head {
  width: 100%; border: 0; background: transparent; cursor: pointer;
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  border-left: 5px solid var(--pc); font: inherit; text-align: left;
}
.pillar-emoji { font-size: 1.3rem; }
.pillar-title { flex: 1; font-weight: 700; }
.pillar-count { font-size: .8rem; color: var(--muted); background: #f1f5f9; padding: 2px 9px; border-radius: 999px; }
.task-list { padding: 0 14px 6px; }

.task { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-top: 1px solid #f1f5f9; }
.task:first-child { border-top: 0; }
.task-check {
  width: 30px; height: 30px; border-radius: 9px; border: 2px solid #cbd5e1; background: #fff;
  cursor: pointer; flex-shrink: 0; font-size: .95rem; color: #fff; font-weight: 800;
  display: grid; place-items: center; transition: all .18s;
}
.task.done .task-check { background: var(--accent-2); border-color: var(--accent-2); }
.task-body { flex: 1; min-width: 0; }
.task-title { font-weight: 700; font-size: .95rem; }
.task-desc { font-size: .8rem; color: var(--muted); margin-top: 2px; }
.task-xp { font-size: .78rem; font-weight: 800; color: var(--accent); background: var(--accent-soft); padding: 3px 8px; border-radius: 999px; flex-shrink: 0; }
.task.done .task-title { color: var(--muted); }

.counter-row { display: flex; align-items: center; gap: 12px; margin: 10px 0 8px; }
.stepper {
  width: 36px; height: 36px; border-radius: 10px; border: 1.5px solid #cbd5e1; background: #fff;
  font-size: 1.3rem; font-weight: 700; cursor: pointer; color: var(--accent); line-height: 1;
}
.stepper:active { transform: scale(.92); }
.counter-val { font-weight: 800; font-size: 1.05rem; }
.counter-val small { font-weight: 500; color: var(--muted); font-size: .78rem; }

/* ---------- Ánimo ---------- */
.mood-row { display: flex; justify-content: space-between; gap: 6px; margin-top: 8px; }
.mood-btn { flex: 1; font-size: 1.6rem; background: #f8fafc; border: 2px solid transparent; border-radius: 12px; padding: 8px 0; cursor: pointer; transition: all .15s; }
.mood-btn.sel { border-color: var(--accent-2); background: var(--accent-soft); transform: scale(1.05); }

/* ---------- Plan ---------- */
.plan-pillar-head { display: flex; gap: 12px; align-items: center; }
.plan-pillar-head h3 { margin: 0; }
.plan-pillar { border-top: 4px solid var(--pc); }
.why { background: #f8fafc; border-radius: 12px; padding: 10px 12px; font-size: .84rem; color: #334155; margin: 10px 0; }
.plan-tasks { list-style: none; }
.plan-tasks li { display: flex; gap: 10px; align-items: center; padding: 9px 0; border-top: 1px solid #f1f5f9; font-size: .88rem; }
.plan-tasks li span:first-child { font-size: 1.2rem; }
.plan-tasks li div { flex: 1; }
.xp-tag { font-size: .72rem; font-weight: 800; color: var(--accent); }

/* ---------- Progreso ---------- */
.chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.chip { background: var(--card); border-radius: 14px; padding: 12px; box-shadow: var(--shadow); display: flex; gap: 8px; align-items: center; }
.chip-ico { font-size: 1.3rem; }
.chip strong { display: block; font-size: 1.2rem; font-weight: 800; line-height: 1; }
.chip small { font-size: .68rem; color: var(--muted); }

.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 8px 0; }
.heat { aspect-ratio: 1; border-radius: 6px; background: #e2e8f0; }
.heat.l0 { background: #e2e8f0; } .heat.l1 { background: #99f6e4; }
.heat.l2 { background: #2dd4bf; } .heat.l3 { background: var(--accent); }
.heat-legend { display: flex; align-items: center; gap: 5px; font-size: .68rem; color: var(--muted); margin-top: 8px; }
.heat-legend i { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }

.mood-history { display: flex; justify-content: space-around; gap: 4px; }
.mh { text-align: center; } .mh span { font-size: 1.5rem; display: block; } .mh small { font-size: .62rem; color: var(--muted); }

.row-btns { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

/* ---------- Botones ---------- */
.btn { border: 0; border-radius: 12px; padding: 12px 16px; font: inherit; font-weight: 700; cursor: pointer; background: #e2e8f0; color: var(--ink); }
.btn.primary { background: var(--accent); color: #fff; }
.btn.primary.big { width: 100%; padding: 15px; font-size: 1.05rem; margin-top: 6px; }
.btn.ghost { background: #f1f5f9; }
.btn.danger { background: var(--danger); color: #fff; }
.btn.danger.ghost { background: #fef2f2; color: var(--danger); }
.btn:active { transform: scale(.97); }

/* ---------- Medallas ---------- */
.badge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.badge { background: var(--card); border-radius: 16px; padding: 16px 12px; text-align: center; box-shadow: var(--shadow); }
.badge.locked { opacity: .55; filter: grayscale(.6); }
.badge.unlocked { outline: 2px solid var(--gold); }
.badge-emoji { font-size: 2.2rem; }
.badge-name { font-weight: 800; font-size: .9rem; margin-top: 6px; }
.badge-desc { font-size: .74rem; color: var(--muted); margin-top: 3px; }

/* ---------- Educación ---------- */
.lesson summary { font-weight: 700; cursor: pointer; list-style: none; }
.lesson summary::-webkit-details-marker { display: none; }
.lesson[open] summary { margin-bottom: 8px; color: var(--accent); }
.lesson p { font-size: .88rem; color: #334155; }
.lesson.read summary { color: var(--muted); }
.preop { list-style: none; }
.preop li { padding: 7px 0; border-top: 1px solid #f1f5f9; font-size: .88rem; }
.disclaimer-card { background: #fffbeb; }
.disclaimer-mini { font-size: .72rem; color: var(--muted); text-align: center; margin: 8px 0; cursor: pointer; }

/* ---------- Navegación inferior ---------- */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 560px; height: var(--nav-h);
  background: rgba(255,255,255,.95); backdrop-filter: blur(10px);
  border-top: 1px solid #e2e8f0; display: flex; z-index: 30;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item { flex: 1; border: 0; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--muted); font: inherit; }
.nav-ico { font-size: 1.3rem; }
.nav-lbl { font-size: .66rem; font-weight: 600; }
.nav-item.active { color: var(--accent); }
.nav-item.active .nav-ico { transform: translateY(-1px) scale(1.08); }

/* ---------- Onboarding ---------- */
.onboarding-mode { padding-bottom: 30px; }
.onboarding { padding: 20px 16px; }
.onb-hero { text-align: center; padding: 24px 8px; }
.onb-logo { font-size: 3.5rem; }
.onb-hero h1 { font-size: 2rem; color: var(--accent); letter-spacing: -.5px; }
.onb-hero p { color: var(--muted); margin-top: 8px; }
.onb-form { display: flex; flex-direction: column; gap: 14px; }
.onb-form label { font-weight: 600; font-size: .88rem; display: flex; flex-direction: column; gap: 6px; }
.onb-form input[type=text], .onb-form input[type=date], .onb-form select {
  font: inherit; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 12px; background: #fff; width: 100%;
}
.onb-form input:focus, .onb-form select:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px var(--accent-soft); }
.check-inline { flex-direction: row !important; align-items: center; gap: 8px !important; }
.check-inline input { width: 20px; height: 20px; }

/* ---------- Toasts ---------- */
.toast-layer { position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; max-width: 560px; padding: 0 16px; pointer-events: none; }
.toast {
  background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px; font-weight: 700; font-size: .88rem;
  box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(16px); transition: all .3s cubic-bezier(.2,.8,.2,1); max-width: 100%;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.level { background: linear-gradient(135deg, var(--gold), #f97316); }

/* ---------- Modales ---------- */
.modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 60; display: grid; place-items: center; padding: 20px; animation: fade .2s; }
.modal { background: #fff; border-radius: 20px; padding: 20px; max-width: 420px; width: 100%; box-shadow: var(--shadow-lg); animation: pop .25s cubic-bezier(.2,.8,.2,1); }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.modal-x { border: 0; background: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: .9rem; }
.modal-body p { margin-bottom: 10px; color: #334155; }
.badge-modal { text-align: center; }
.badge-modal .big-emoji { font-size: 4.5rem; animation: bounce .6s; }
.badge-modal h2 { color: var(--gold); }
.badge-modal .btn { margin-top: 14px; }
.confetti { font-size: 2rem; animation: spin 1s; }

@keyframes fade { from { opacity: 0; } }
@keyframes pop { from { transform: scale(.9); opacity: 0; } }
@keyframes bounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-14px);} 60%{transform:translateY(-6px);} }
@keyframes spin { from { transform: rotate(-20deg) scale(.5); opacity:0; } to { transform: rotate(0) scale(1); opacity:1; } }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

@media (min-width: 480px) {
  .chips { grid-template-columns: repeat(3, 1fr); }
}


/* ================= Ampliación: editor, recursos, blog, gráficas ================= */

body.reduce-motion * { animation: none !important; transition: none !important; }

.btn.block { width: 100%; display: block; text-align: center; margin-bottom: 12px; }
.back-btn { display: inline-block; margin-bottom: 12px; }

/* ---------- Gráficas ---------- */
.chart { width: 100%; height: auto; display: block; }
.chart-empty { padding: 20px; text-align: center; color: var(--muted); font-size: .85rem; }

/* ---------- Recursos / vídeos ---------- */
.resource-title { font-weight: 700; margin-bottom: 6px; }
.video { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; }
.video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
.empty-state { text-align: center; }
.empty-emoji { font-size: 3rem; }
.empty-state .btn { margin-top: 12px; }

/* ---------- Blog ---------- */
.post-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 6px; }
.post-card { display: flex; gap: 12px; align-items: center; text-align: left; background: var(--card); border: 0; border-radius: 16px; padding: 10px; box-shadow: var(--shadow); cursor: pointer; font: inherit; width: 100%; }
.post-card:active { transform: scale(.99); }
.post-cover { width: 64px; height: 64px; border-radius: 12px; background-size: cover; background-position: center; flex-shrink: 0; background-color: var(--accent-soft); }
.post-cover.ph { display: grid; place-items: center; font-size: 1.8rem; }
.post-info { flex: 1; min-width: 0; }
.post-info strong { display: block; }
.post-card.read { opacity: .72; }
.post-full { }
.post-cover-full { width: 100%; height: 170px; border-radius: 12px; background-size: cover; background-position: center; margin-bottom: 12px; }
.post-tag { display: inline-block; background: var(--accent-soft); color: var(--accent); font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
.post-full h2 { margin: 8px 0 4px; }
.post-body { margin-top: 12px; color: #334155; line-height: 1.6; }

/* ---------- Menú Más ---------- */
.more-menu { padding: 4px 0; }
.more-item { width: 100%; border: 0; background: transparent; display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; font: inherit; text-align: left; border-top: 1px solid #f1f5f9; }
.more-item:first-child { border-top: 0; }
.more-ico { font-size: 1.4rem; }
.more-txt { flex: 1; } .more-txt strong { display: block; } .more-txt small { font-size: .76rem; }
.more-arrow { color: #cbd5e1; font-size: 1.4rem; }

/* ---------- Editor ---------- */
.editor-intro { margin: -4px 4px 12px; }
.editor-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
.etab { flex: 1; white-space: nowrap; border: 0; background: #e2e8f0; color: var(--ink); border-radius: 10px; padding: 9px 8px; font: inherit; font-weight: 700; font-size: .8rem; cursor: pointer; }
.etab.active { background: var(--accent); color: #fff; }

.etask-group-head { font-weight: 800; border-left: 4px solid var(--pc); padding-left: 8px; margin-bottom: 8px; }
.etask, .eres { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #f1f5f9; }
.etask:first-child, .eres:first-child { border-top: 0; }
.etask.off { opacity: .5; }
.etask-main, .eres-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.etask-main small, .eres-main small { font-size: .72rem; }
.eres-ico { font-size: 1.2rem; }
.etask-actions { display: flex; gap: 4px; }
.mini-btn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: .95rem; }
.mini-btn.danger { border-color: #fecaca; background: #fef2f2; }

/* ---------- Formularios apilados ---------- */
.stack-form { display: flex; flex-direction: column; gap: 12px; }
.stack-form label { font-weight: 600; font-size: .86rem; display: flex; flex-direction: column; gap: 6px; }
.stack-form input[type=text], .stack-form input[type=url], .stack-form input[type=number], .stack-form input[type=date], .stack-form select, .stack-form textarea {
  font: inherit; padding: 11px; border: 1.5px solid #cbd5e1; border-radius: 10px; background: #fff; width: 100%;
}
.stack-form textarea { resize: vertical; }
.stack-form input:focus, .stack-form select:focus, .stack-form textarea:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px var(--accent-soft); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ---------- Ajustes ---------- */
.goal-setter { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 8px; }
.switch-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 6px 0; font-weight: 600; font-size: .9rem; }
.switch-row input[type=checkbox] { width: 44px; height: 26px; appearance: none; -webkit-appearance: none; background: #cbd5e1; border-radius: 999px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.switch-row input[type=checkbox]:checked { background: var(--accent-2); }
.switch-row input[type=checkbox]::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform .2s; }
.switch-row input[type=checkbox]:checked::after { transform: translateX(18px); }
.times-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
.time-chip { background: var(--accent-soft); color: var(--accent); font-weight: 700; padding: 5px 8px 5px 12px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; }
.time-chip button { border: 0; background: rgba(15,118,110,.15); width: 20px; height: 20px; border-radius: 50%; cursor: pointer; color: var(--accent); font-size: .7rem; }
.add-time-row { display: flex; gap: 8px; align-items: center; }
.add-time-row input[type=time] { font: inherit; padding: 9px; border: 1.5px solid #cbd5e1; border-radius: 10px; }
.file-btn { position: relative; overflow: hidden; }
.pin-input { font: inherit; font-size: 1.6rem; letter-spacing: 8px; text-align: center; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; width: 100%; margin: 8px 0; }
.pin-input.shake { animation: shake .3s; border-color: var(--danger); }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }


/* ================= Ampliación: fragilidad, cuidador, accesibilidad, juego ================= */

/* ---------- Accesibilidad ---------- */
html.large-text { font-size: 19px; }
body.high-contrast { --ink: #000; --muted: #1f2937; }
body.high-contrast .card { border: 1.5px solid #0f172a; }
body.high-contrast .task-desc, body.high-contrast .muted, body.high-contrast small { color: #1f2937 !important; }
body.high-contrast .btn.ghost { border: 1.5px solid #0f172a; }

/* ---------- Botón escuchar (TTS) ---------- */
.speak-btn { margin-top: 10px; font-size: .85rem; padding: 8px 14px; }

/* ---------- Para el cuidador ---------- */
.ctips { display: flex; flex-direction: column; gap: 14px; }
.ctip { display: flex; gap: 12px; align-items: flex-start; }
.ctip-ico { font-size: 1.5rem; flex-shrink: 0; }
.ctip strong { display: block; }
.alarm-card { background: #fef2f2; border-left: 5px solid var(--danger); }
.alarm-card h3 { color: var(--danger); }
.alarm-list { margin: 8px 0 0 1.1rem; }
.alarm-list li { padding: 5px 0; font-size: .9rem; }

/* ---------- Cribado FRAIL ---------- */
.frail-result { text-align: center; border-top: 5px solid var(--fc); }
.frail-emoji { font-size: 2.6rem; }
.frail-score { font-size: 1.8rem; font-weight: 800; color: var(--fc); }
.frail-score small { font-size: .9rem; color: var(--muted); font-weight: 600; }
.frail-label { font-weight: 800; margin-bottom: 8px; }
.frail-q { padding: 12px 0; border-top: 1px solid #f1f5f9; }
.frail-q:first-of-type { border-top: 0; }
.frail-opts { display: flex; gap: 20px; margin-top: 8px; }
.fopt { display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; }
.fopt input { width: 20px; height: 20px; }

/* ---------- Medicación ---------- */
.med-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #f1f5f9; }
.med-row:first-child { border-top: 0; }
.print-doc { background: #fff; border: 1px dashed #cbd5e1; border-radius: 14px; padding: 18px; margin-top: 12px; }
.print-doc h2 { font-size: 1.2rem; margin-bottom: 8px; }
.print-doc h3 { font-size: .95rem; margin: 14px 0 4px; color: var(--accent); }
.report-steps { margin: 10px 0 0; padding-left: 20px; }
.report-steps li { margin: 4px 0; color: var(--muted); font-size: .9rem; }
.email-note { margin-top: 6px; }
.doc-header { margin-bottom: 10px; }
.doc-meta { width: 100%; border-collapse: collapse; margin-top: 8px; }
.doc-meta td { padding: 4px 6px; border-bottom: 1px solid #e5e7eb; font-size: .92rem; vertical-align: top; }
.doc-meta td:first-child { color: var(--muted); width: 45%; }
.doc-meta td:last-child { font-weight: 600; }

/* Guía de ayuno (recurso interno con cuestionario + acordeón) */
.fasting-quiz h3 { font-size: 1rem; margin-bottom: 4px; }
.fasting-opt { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-top: 1px solid #eef2f7; cursor: pointer; }
.fasting-opt:first-of-type { border-top: 0; }
.fasting-opt input { margin-top: 2px; width: 18px; height: 18px; flex: 0 0 auto; accent-color: var(--accent); }
.fasting-block { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin: 10px 0; overflow: hidden; }
.fasting-block > summary { list-style: none; cursor: pointer; padding: 14px 16px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; }
.fasting-block > summary::-webkit-details-marker { display: none; }
.fasting-block > summary::after { content: '⌄'; margin-left: auto; opacity: .5; font-size: 1.2rem; }
.fasting-block[open] > summary::after { content: '⌃'; }
.fasting-block.is-active { border: 2px solid var(--accent); }
.fasting-block .fasting-body { padding: 0 16px 16px; }
.fasting-body h4 { font-size: .95rem; margin: 16px 0 4px; color: var(--accent); }
.fasting-body h4:first-child { margin-top: 0; }
.fasting-body p { margin: 10px 0; }
.fasting-body p:first-child { margin-top: 0; }
.fasting-body ul { margin: 8px 0; padding-left: 22px; list-style: disc; }
.fasting-body ol { margin: 8px 0; padding-left: 22px; list-style: decimal; }
.fasting-body li { margin: 5px 0; padding-left: 2px; }
.tag-you { background: var(--accent); color: #fff; font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
.fasting-disclaimer { margin: 14px 4px 4px; }
.med-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.med-table th, .med-table td { border: 1px solid #e2e8f0; padding: 7px 8px; text-align: left; font-size: .85rem; }
.med-table th { background: #f8fafc; }
.doc-foot { margin-top: 16px; font-size: .72rem; color: var(--muted); }

/* ---------- Juego de memoria ---------- */
.game-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.mini-exit { padding: 6px 14px; }
.mgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.mcard {
  aspect-ratio: 1; border: 0; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
  font-size: 2rem; display: grid; place-items: center; transition: transform .15s, background .2s;
}
.mcard.up { background: #fff; border: 2px solid var(--accent-2); }
.mcard.matched { background: var(--accent-soft); opacity: .65; }
.mcard:active { transform: scale(.94); }
.mcard:disabled { cursor: default; }
.game-done { text-align: center; }
.game-done .big-emoji { font-size: 3rem; }

/* ---------- Impresión (guardar como PDF) ---------- */
@media print {
  .app-header, .bottom-nav, .toast-layer, .no-print, .section-label { display: none !important; }
  #modal-root { display: none !important; }
  body { background: #fff; }
  #app { max-width: none; }
  .content { padding: 0; }
  .print-doc { border: 0; padding: 0; margin: 0; }
  .med-table th, .med-table td { border: 1px solid #333; }
}


/* ================= Ampliación v3: fases, perfiles, informe, idioma ================= */

/* ---------- Banner de fase (plan adaptativo) ---------- */
.phase-banner { border-left: 5px solid var(--pc); }
.phase-head { display: flex; align-items: center; gap: 10px; }
.phase-emoji { font-size: 1.6rem; }
.phase-title { display: block; font-size: 1.05rem; }
.phase-focus { margin-top: 8px; font-size: .9rem; color: #334155; }

/* ---------- Selector de idioma ---------- */
.lang-select {
  font: inherit; padding: 11px; border: 1.5px solid #cbd5e1; border-radius: 10px;
  background: #fff; width: 100%; margin-top: 4px;
}
.lang-select:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px var(--accent-soft); }

/* ---------- Perfiles ---------- */
.prof-list { display: flex; flex-direction: column; }
.prof-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 0; border-top: 1px solid #f1f5f9; }
.prof-row:first-child { border-top: 0; }
.prof-row.active { }
.prof-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.prof-badge { font-size: .68rem; font-weight: 800; background: var(--accent-soft); color: var(--accent); padding: 2px 8px; border-radius: 999px; }
.prof-actions { display: flex; gap: 4px; }

/* ---------- Informe: medallas ---------- */
.rep-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.rep-badge { font-size: .78rem; background: #f1f5f9; padding: 3px 8px; border-radius: 999px; }

/* Alto contraste: refuerzos extra para banners y chips */
body.high-contrast .phase-focus { color: #111827; }


/* ---------- Aviso de protección del Modo médico ---------- */
.ed-warn { background: #fffbeb; border-left: 5px solid var(--gold); }
.ed-warn p { font-size: .88rem; color: #334155; margin-bottom: 10px; }
.ed-protected { text-align: center; color: var(--accent); font-weight: 700; font-size: .85rem; background: var(--accent-soft); padding: 8px; border-radius: 10px; margin-bottom: 12px; }


/* ---------- Lecciones ampliadas ---------- */
.lesson-body { font-size: .9rem; color: #334155; line-height: 1.6; }
.lesson[open] .lesson-body { margin-top: 6px; }


/* ---------- Escala de Edmonton (opciones apiladas) ---------- */
.efs-q { padding: 14px 0; }
.efs-opts { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.efs-opt { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: .9rem; }
.efs-opt:hover { border-color: var(--accent-2); }
.efs-opt input { width: 20px; height: 20px; flex-shrink: 0; margin: 0; }


/* ================= Evaluaciones (hub + comparación) ================= */
.assess-list { padding: 4px 0; }
.assess-row { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-top: 1px solid #f1f5f9; }
.assess-row:first-child { border-top: 0; }
.assess-ico { font-size: 1.5rem; flex-shrink: 0; }
.assess-main { flex: 1; min-width: 0; }
.assess-main > strong { display: block; }
.mini-do { padding: 8px 12px; font-size: .82rem; white-space: nowrap; }
.cmp-inline { font-size: .8rem; font-weight: 700; margin-top: 4px; }
.assess-main .cmp-inline { margin-top: 2px; }
.cmp-up { color: #16a34a; }
.cmp-down { color: #dc2626; }
.cmp-same { color: var(--muted); }
.reeval-card { background: linear-gradient(180deg, #fffbeb, #fff); border-left: 5px solid var(--gold); }
.reeval-card p { font-size: .9rem; margin-bottom: 10px; color: #334155; }
body.high-contrast .cmp-up { color: #15803d; }
body.high-contrast .cmp-down { color: #b91c1c; }


/* ================= Maquetación "Hoy": resumen + detalle desplegable ================= */
.task-desc.has-detail { margin-top: 2px; }
.task-summary { margin: 0; font-size: .8rem; color: var(--muted); }
.task-detail {
  margin-top: 6px;
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.5;
  border-left: 2px solid var(--accent-soft);
  padding-left: 8px;
}
.task-detail[hidden] { display: none; }
.task-more {
  margin-top: 4px;
  padding: 0;
  background: none;
  border: none;
  color: var(--accent);
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
}
.task-more::after { content: ' ⌄'; }
.task-more[aria-expanded="true"]::after { content: ' ⌃'; }

      body: `La prehabilitación consiste en preparar tu cuerpo y tu mente en las semanas previas a la operación para llegar lo más fuerte posible. La idea es sencilla: una cirugía es un esfuerzo físico importante, parecido a una carrera de fondo, y llegar entrenado ayuda a superarla mejor.

La investigación en los últimos años es bastante consistente: las personas que se preparan antes suelen tener menos complicaciones (sobre todo pulmonares), pasan menos días ingresadas y recuperan antes su autonomía para las actividades del día a día. El beneficio es aún mayor en personas mayores o con poca reserva física.

No hace falta hacerlo perfecto. Lo que de verdad marca la diferencia es la constancia: pequeños pasos, casi todos los días. Cada tarea que completas aquí es una inversión directa en tu recuperación.`,
      body_en: `Prehabilitation means preparing your body and mind in the weeks before surgery so you arrive as strong as possible. The idea is simple: surgery is a major physical effort, similar to a long-distance race, and arriving trained helps you get through it better.

Research in recent years is fairly consistent: people who prepare beforehand tend to have fewer complications (especially lung problems), spend fewer days in hospital and recover their day-to-day independence sooner. The benefit is even greater for older people or those with little physical reserve.

You do not need to do it perfectly. What truly makes the difference is consistency: small steps, almost every day. Every task you complete here is a direct investment in your recovery.`,
      body_ca: `La prehabilitació consisteix a preparar el teu cos i la teva ment en les setmanes prèvies a l’operació per arribar tan fort com sigui possible. La idea és senzilla: una cirurgia és un esforç físic important, semblant a una cursa de fons, i arribar entrenat ajuda a superar-la millor.

La investigació dels últims anys és força consistent: les persones que es preparen abans solen tenir menys complicacions (sobretot pulmonars), passen menys dies ingressades i recuperen abans la seva autonomia per a les activitats del dia a dia. El benefici és encara més gran en persones grans o amb poca reserva física.

No cal fer-ho perfecte. El que de veritat marca la diferència és la constància: petits passos, gairebé cada dia. Cada tasca que completes aquí és una inversió directa en la teva recuperació.`
    },
    {
      id: "l2",
      title: "Los pilares de tu preparación",
      title_en: "The pillars of your preparation",
      title_ca: "Els pilars de la teva preparació",
      body: `La prehabilitación se apoya en varios pilares que se refuerzan entre sí:

• Ejercicio: mejora tu corazón, tus pulmones y tu fuerza muscular.
• Respiración: entrena los músculos que más sufren con la anestesia.
• Nutrición: aporta el "material" (sobre todo proteína) que tu cuerpo necesita para cicatrizar.
• Bienestar mental y sueño: reducen el estrés y apoyan a tus defensas.

A estos se suman hábitos decisivos como dejar el tabaco y reducir el alcohol. Trabajar varios a la vez —lo que los profesionales llaman prehabilitación "multimodal"— da mejores resultados que centrarse en uno solo. Por eso el programa combina un poco de cada uno cada día.`,
      body_en: `Prehabilitation rests on several pillars that reinforce each other:

• Exercise: improves your heart, lungs and muscle strength.
• Breathing: trains the muscles that suffer most with anesthesia.
• Nutrition: provides the material (especially protein) your body needs to heal.
• Mental wellbeing and sleep: reduce stress and support your defenses.

On top of these come decisive habits such as quitting tobacco and cutting down on alcohol. Working on several at once, what professionals call multimodal prehabilitation, gives better results than focusing on just one. That is why the program blends a little of each every day.`,
      body_ca: `La prehabilitació es recolza en diversos pilars que es reforcen entre si:

• Exercici: millora el cor, els pulmons i la força muscular.
• Respiració: entrena els músculs que més pateixen amb l’anestèsia.
• Nutrició: aporta el "material" (sobretot proteïna) que el teu cos necessita per cicatritzar.
• Benestar mental i son: redueixen l’estrès i donen suport a les teves defenses.

A aquests s’hi sumen hàbits decisius com deixar el tabac i reduir l’alcohol. Treballar-ne diversos alhora —el que els professionals anomenen prehabilitació "multimodal"— dona millors resultats que centrar-se en un de sol. Per això el programa combina una mica de cada un cada dia.`
    },
    {
      id: "l3",
      title: "Tu anestesia, paso a paso",
      title_en: "Your anesthesia, step by step",
      title_ca: "La teva anestèsia, pas a pas",
      body: `Antes de la cirugía tendrás una consulta de preanestesia, donde revisan tu salud, tus medicamentos y tus alergias, y resuelven tus dudas. Es el mejor momento para preguntar todo lo que te preocupe.

El día de la operación, el equipo de anestesia te vigila de forma continua (corazón, oxígeno, tensión, respiración). Con anestesia general estarás dormido profundamente y no sentirás ni recordarás nada del procedimiento. En otros casos puede usarse anestesia regional (se duerme solo una zona), a veces combinada con sedación.

Al terminar despertarás en una sala de recuperación, atendido de cerca hasta que estés estable. Entender este recorrido reduce mucho el miedo: lo desconocido asusta más que lo que ya conocemos.`,
      body_en: `Before surgery you will have a pre-anesthesia appointment, where they review your health, your medicines and your allergies, and answer your questions. It is the best moment to ask anything that worries you.

On the day of the operation, the anesthesia team watches you continuously (heart, oxygen, blood pressure, breathing). Under general anesthesia you will be deeply asleep and will not feel or remember anything about the procedure. In other cases regional anesthesia may be used (only one area is numbed), sometimes combined with sedation.

Afterwards you will wake up in a recovery room, closely looked after until you are stable. Understanding this journey greatly reduces fear: the unknown is scarier than what we already understand.`,
      body_ca: `Abans de la cirurgia tindràs una consulta de preanestèsia, on revisen la teva salut, els teus medicaments i les teves al·lèrgies, i resolen els teus dubtes. És el millor moment per preguntar tot el que et preocupi.

El dia de l’operació, l’equip d’anestèsia et vigila de forma contínua (cor, oxigen, tensió, respiració). Amb anestèsia general estaràs dormit profundament i no sentiràs ni recordaràs res del procediment. En altres casos es pot fer servir anestèsia regional (s’adorm només una zona), de vegades combinada amb sedació.

En acabar et despertaràs en una sala de recuperació, atès de prop fins que estiguis estable. Entendre aquest recorregut redueix molt la por: allò desconegut fa més por que allò que ja coneixem.`
    },
    {
      id: "l4",
      title: "Por qué entrenar la respiración",
      title_en: "Why train your breathing",
      title_ca: "Per què entrenar la respiració",
      body: `Durante y después de una anestesia general, es habitual que se cierren pequeñas zonas de los pulmones (se llama atelectasia). Si no se corrige, puede facilitar infecciones como la neumonía.

Buenas noticias: los músculos de la respiración se entrenan, igual que cualquier otro. Practicar antes inspiraciones lentas y profundas, y usar el inspirómetro incentivador si te lo dan, hace que tus pulmones lleguen más preparados. Diversos estudios asocian este entrenamiento con menos complicaciones pulmonares tras la cirugía.

Además, dominar la respiración lenta te dará una herramienta muy útil para calmar los nervios antes de entrar a quirófano y para manejar las molestias después.`,
      body_en: `During and after general anesthesia, it is common for small areas of the lungs to close off (this is called atelectasis). If it is not corrected, it can make infections such as pneumonia more likely.

Good news: the breathing muscles can be trained, just like any other. Practising slow, deep breaths beforehand, and using the incentive spirometer if you are given one, means your lungs arrive better prepared. Several studies link this training with fewer lung complications after surgery.

On top of that, mastering slow breathing gives you a very useful tool to calm your nerves before going into the operating room and to cope with discomfort afterwards.`,
      body_ca: `Durant i després d’una anestèsia general, és habitual que es tanquin petites zones dels pulmons (s’anomena atelèctasi). Si no es corregeix, pot facilitar infeccions com la pneumònia.

Bones notícies: els músculs de la respiració s’entrenen, igual que qualsevol altre. Practicar abans inspiracions lentes i profundes, i fer servir l’inspiròmetre incentivador si te’l donen, fa que els teus pulmons arribin més preparats. Diversos estudis associen aquest entrenament amb menys complicacions pulmonars després de la cirurgia.

A més, dominar la respiració lenta et donarà una eina molt útil per calmar els nervis abans d’entrar a quiròfan i per gestionar les molèsties després.`
    },
    {
      id: "l5",
      title: "Tabaco y alcohol: el mayor cambio en menos tiempo",
      title_en: "Tobacco and alcohol: the biggest change in the least time",
      title_ca: "Tabac i alcohol: el canvi més gran en menys temps",
      body: `Dejar de fumar antes de la cirugía es una de las decisiones con más impacto. En solo 12-24 horas baja el monóxido de carbono de la sangre y llega más oxígeno a tus tejidos. Dejarlo unas 4 semanas antes reduce de forma clara las complicaciones de la herida y respiratorias.

Con el alcohol ocurre algo parecido: reducirlo o suspenderlo mejora la coagulación, la función del hígado y las defensas, y disminuye el riesgo de complicaciones.

No tienes que hacerlo solo. Pide ayuda a tu equipo: existen consejos, apoyos y, si hace falta, tratamientos que hacen el proceso mucho más llevadero. Cualquier reducción suma, pero dejarlo por completo es lo ideal.`,
      body_en: `Quitting smoking before surgery is one of the most impactful decisions. In just 12-24 hours the carbon monoxide in your blood drops and more oxygen reaches your tissues. Stopping about 4 weeks before clearly reduces wound and respiratory complications.

Something similar happens with alcohol: reducing or stopping it improves clotting, liver function and your defenses, and lowers the risk of complications.

You do not have to do it alone. Ask your team for help: there is advice, support and, if needed, treatments that make the process much easier. Any reduction helps, but stopping completely is ideal.`,
      body_ca: `Deixar de fumar abans de la cirurgia és una de les decisions amb més impacte. En només 12-24 hores baixa el monòxid de carboni de la sang i arriba més oxigen als teus teixits. Deixar-ho unes 4 setmanes abans redueix de forma clara les complicacions de la ferida i respiratòries.

Amb l’alcohol passa una cosa semblant: reduir-lo o suspendre’l millora la coagulació, la funció del fetge i les defenses, i disminueix el risc de complicacions.

No ho has de fer sol. Demana ajuda al teu equip: hi ha consells, suports i, si cal, tractaments que fan el procés molt més suportable. Qualsevol reducció suma, però deixar-ho del tot és l’ideal.`
    },
    {
      id: "l6",
      title: 'Nutrición: el "ladrillo" de tu recuperación',
      title_en: "Nutrition: the building block of your recovery",
      title_ca: 'Nutrició: el "maó" de la teva recuperació',
      body: `La cirugía dispara las necesidades de proteína, porque tu cuerpo la usa para cicatrizar la herida, defenderse de infecciones y no perder músculo. Por eso muchos expertos recomiendan cuidar la alimentación como parte de la preparación.

Elige proteínas de calidad y repártelas en todas las comidas, incluido el desayuno: huevos, pescado, pollo, legumbres, lácteos como yogur o queso. Repartirla a lo largo del día se aprovecha mejor que concentrarla en una sola comida.

Si tienes poco apetito o has perdido peso sin querer, no lo dejes pasar: coméntalo con tu equipo. Pueden enriquecer tus platos o recomendarte suplementos nutricionales. Llegar bien nutrido es una de las mejores defensas frente a las complicaciones.`,
      body_en: `Surgery raises your protein needs, because your body uses it to heal the wound, fight infections and avoid losing muscle. That is why many experts recommend looking after your diet as part of the preparation.

Choose good-quality protein and spread it across all your meals, including breakfast: eggs, fish, chicken, legumes, dairy such as yogurt or cheese. Spreading it through the day is used better than concentrating it in a single meal.

If you have little appetite or have lost weight without meaning to, do not ignore it: tell your team. They can enrich your meals or recommend nutritional supplements. Arriving well nourished is one of the best defenses against complications.`,
      body_ca: `La cirurgia dispara les necessitats de proteïna, perquè el teu cos la fa servir per cicatritzar la ferida, defensar-se de les infeccions i no perdre múscul. Per això molts experts recomanen cuidar l’alimentació com a part de la preparació.

Tria proteïnes de qualitat i reparteix-les en tots els àpats, inclòs l’esmorzar: ous, peix, pollastre, llegums, lactis com iogurt o formatge. Repartir-la al llarg del dia s’aprofita millor que concentrar-la en un sol àpat.

Si tens poca gana o has perdut pes sense voler, no ho deixis passar: comenta-ho al teu equip. Poden enriquir els teus plats o recomanar-te suplements nutricionals. Arribar ben nodrit és una de les millors defenses davant les complicacions.`
    },
    {
      id: "l7",
      title: "El ayuno moderno y la bebida de hidratos",
      title_en: "Modern fasting and the carbohydrate drink",
      title_ca: "El dejuni modern i la beguda d’hidrats",
      body: `Durante años se pidió a los pacientes estar "en ayunas desde medianoche". Hoy sabemos que ese ayuno tan largo no aporta seguridad extra y sí más malestar (sed, hambre, debilidad).

Muchos protocolos modernos permiten líquidos claros hasta unas 2 horas antes y, en casos seleccionados, una bebida rica en hidratos de carbono la noche anterior y unas horas antes. Esto puede reducir la sensación de sed y ansiedad y ayudar a tu cuerpo a afrontar mejor el estrés de la operación.

Muy importante: esto depende de tu tipo de cirugía y de las normas de tu centro. NUNCA comas ni bebas nada por tu cuenta el día de la operación; sigue exactamente lo que te indiquen. Esa instrucción concreta es siempre tu norma.`,
      body_en: `For years patients were told to fast "from midnight". We now know that such a long fast adds no extra safety and does cause more discomfort (thirst, hunger, weakness).

Many modern protocols allow clear fluids up to about 2 hours before and, in selected cases, a carbohydrate-rich drink the night before and a few hours before. This can reduce thirst and anxiety and help your body cope better with the stress of the operation.

Very important: this depends on your type of surgery and your hospital rules. NEVER eat or drink anything on your own on the day of the operation; follow exactly what you are told. That specific instruction is always your rule.`,
      body_ca: `Durant anys es demanava als pacients estar "en dejú des de mitjanit". Avui sabem que aquest dejuni tan llarg no aporta seguretat extra i sí més malestar (set, gana, debilitat).

Molts protocols moderns permeten líquids clars fins a unes 2 hores abans i, en casos seleccionats, una beguda rica en hidrats de carboni la nit anterior i unes hores abans. Això pot reduir la sensació de set i ansietat i ajudar el teu cos a afrontar millor l’estrès de l’operació.

Molt important: això depèn del teu tipus de cirurgia i de les normes del teu centre. MAI mengis ni beguis res pel teu compte el dia de l’operació; segueix exactament el que t’indiquin. Aquesta instrucció concreta és sempre la teva norma.`
    },
    {
      id: "l8",
      title: "Calmar la ansiedad antes del quirófano",
      title_en: "Calming anxiety before the operating room",
      title_ca: "Calmar l’ansietat abans del quiròfan",
      body: `Sentir miedo o nervios antes de una cirugía es completamente normal. La buena noticia es que puedes entrenar tu mente para llevarlo mejor, y hacerlo tiene premio: menos ansiedad se asocia con menos dolor percibido y una recuperación más llevadera.

Prueba técnicas sencillas y con respaldo: la respiración lenta 4-6 (inhalar contando 4, exhalar contando 6), la relajación muscular progresiva (tensar y soltar grupos de músculos de los pies a la cabeza) y la visualización positiva (imaginarte recuperándote bien, en casa).

Hablar de tus miedos también ayuda: comparte tus dudas con tu equipo y con tus seres queridos. Y cuida el sueño la semana previa, porque descansar refuerza tu ánimo y tus defensas.`,
      body_en: `Feeling fear or nerves before surgery is completely normal. The good news is that you can train your mind to cope better, and it pays off: less anxiety is linked to less perceived pain and an easier recovery.

Try simple, well-supported techniques: slow 4-6 breathing (breathe in counting to 4, out counting to 6), progressive muscle relaxation (tense and release muscle groups from feet to head) and positive visualization (picturing yourself recovering well, at home).

Talking about your fears also helps: share your worries with your team and your loved ones. And look after your sleep the week before, because resting strengthens your mood and your defenses.`,
      body_ca: `Sentir por o nervis abans d’una cirurgia és completament normal. La bona notícia és que pots entrenar la teva ment per portar-ho millor, i fer-ho té premi: menys ansietat s’associa amb menys dolor percebut i una recuperació més suportable.

Prova tècniques senzilles i avalades: la respiració lenta 4-6 (inspirar comptant 4, expirar comptant 6), la relaxació muscular progressiva (tensar i deixar anar grups de músculs dels peus al cap) i la visualització positiva (imaginar-te recuperant-te bé, a casa).

Parlar de les teves pors també ajuda: comparteix els teus dubtes amb el teu equip i amb els teus éssers estimats. I cuida el son la setmana prèvia, perquè descansar reforça el teu ànim i les teves defenses.`
    },
    {
      id: "l9",
      title: "Dormir bien: tu aliado silencioso",
      title_en: "Sleeping well: your quiet ally",
      title_ca: "Dormir bé: el teu aliat silenciós",
      body: `El sueño no es tiempo perdido: mientras duermes, tu cuerpo repara tejidos, ordena la memoria y refuerza el sistema inmune. Llegar descansado a la cirugía te ayuda a tolerar mejor el estrés y a recuperarte antes.

Apunta a 7-8 horas la mayoría de las noches. Ayuda mucho mantener horarios regulares, recibir luz natural por la mañana, evitar la cafeína desde la tarde y dejar las pantallas (móvil, televisión) al menos 30-60 minutos antes de acostarte, porque su luz "engaña" a tu reloj interno.

Crea una rutina tranquila antes de dormir: luz tenue, una ducha templada, lectura o respiración lenta. Si los nervios no te dejan dormir en los días previos, no te automediques: coméntalo en tu consulta.`,
      body_en: `Sleep is not wasted time: while you sleep, your body repairs tissues, organizes memory and strengthens the immune system. Arriving rested for surgery helps you tolerate stress better and recover sooner.

Aim for 7-8 hours most nights. It helps a lot to keep regular hours, get natural light in the morning, avoid caffeine from the afternoon on and put screens (phone, TV) away at least 30-60 minutes before bed, because their light tricks your internal clock.

Create a calm bedtime routine: dim light, a warm shower, reading or slow breathing. If nerves keep you awake in the days before, do not self-medicate: mention it at your appointment.`,
      body_ca: `El son no és temps perdut: mentre dorms, el teu cos repara teixits, ordena la memòria i reforça el sistema immunitari. Arribar descansat a la cirurgia t’ajuda a tolerar millor l’estrès i a recuperar-te abans.

Apunta a 7-8 hores la majoria de nits. Ajuda molt mantenir horaris regulars, rebre llum natural al matí, evitar la cafeïna des de la tarda i deixar les pantalles (mòbil, televisió) almenys 30-60 minuts abans d’anar a dormir, perquè la seva llum "enganya" el teu rellotge intern.

Crea una rutina tranquil·la abans de dormir: llum tènue, una dutxa temperada, lectura o respiració lenta. Si els nervis no et deixen dormir els dies previs, no t’automediquis: comenta-ho a la teva consulta.`
    },
    {
      id: "l10",
      title: "Mindfulness: entrena la calma",
      title_en: "Mindfulness: train your calm",
      title_ca: "Mindfulness: entrena la calma",
      body: `El mindfulness, o atención plena, es prestar atención al momento presente sin juzgarlo. No consiste en "dejar la mente en blanco", sino en darte cuenta de cuándo tu mente se va a las preocupaciones y traerla, con amabilidad, de vuelta a la respiración o a lo que estás haciendo.

Practicado a diario, aunque sean 5-10 minutos, ayuda a bajar la ansiedad, mejora el sueño y puede reducir la percepción del dolor. Es como un músculo: cuanto más lo entrenas, más fácil te resulta calmarte cuando lo necesitas, por ejemplo el día de la cirugía.

Empieza fácil: siéntate cómodo, cierra los ojos y sigue tu respiración durante unos minutos. Puedes apoyarte en audios o vídeos de meditación guiada; en la sección de Recursos tu equipo puede dejarte algunos.`,
      body_en: `Mindfulness means paying attention to the present moment without judging it. It is not about emptying your mind, but about noticing when your mind drifts to worries and gently bringing it back to your breath or to what you are doing.

Practised daily, even for 5-10 minutes, it helps lower anxiety, improves sleep and can reduce how much pain you feel. It is like a muscle: the more you train it, the easier it is to calm down when you need it, for example on the day of surgery.

Start easy: sit comfortably, close your eyes and follow your breathing for a few minutes. You can lean on guided meditation audios or videos; in the Resources section your team can leave you some.`,
      body_ca: `El mindfulness, o atenció plena, és parar atenció al moment present sense jutjar-lo. No consisteix a "deixar la ment en blanc", sinó a adonar-te de quan la teva ment se’n va a les preocupacions i tornar-la, amb amabilitat, a la respiració o al que estàs fent.

Practicat cada dia, encara que siguin 5-10 minuts, ajuda a baixar l’ansietat, millora el son i pot reduir la percepció del dolor. És com un múscul: com més l’entrenes, més fàcil et resulta calmar-te quan ho necessites, per exemple el dia de la cirurgia.

Comença fàcil: seu còmode, tanca els ulls i segueix la teva respiració durant uns minuts. Et pots recolzar en àudios o vídeos de meditació guiada; a la secció de Recursos el teu equip te’n pot deixar alguns.`
    },
    {
      id: "l11",
      title: "¿Cuánto ejercicio y de qué intensidad?",
      title_en: "How much exercise and how hard?",
      title_ca: "Quant exercici i de quina intensitat?",
      body: `La recomendación general para prepararte combina ejercicio aeróbico y de fuerza, adaptado a tu punto de partida.

• Aeróbico (caminar, bici estática): apunta a moverte casi todos los días, hasta sumar unos 150 minutos a la semana. Una buena guía de intensidad es la "prueba del habla": deberías poder hablar, pero no cantar.
• Fuerza: 2-3 días por semana, trabajando piernas, brazos y tronco (levantarte de una silla, puntillas, elevaciones con una botella de agua).
• Empieza suave y progresa poco a poco. Si tienes poca reserva o miedo a caerte, comienza sentado o con apoyo; es igual de válido.

Señales para parar y consultar: dolor en el pecho, mareo, falta de aire desproporcionada o palpitaciones. Ajusta siempre la intensidad a lo que tu equipo médico te haya autorizado.`,
      body_en: `The general recommendation to prepare combines aerobic and strength exercise, adapted to your starting point.

• Aerobic (walking, stationary bike): aim to move almost every day, building up to about 150 minutes a week. A good intensity guide is the talk test: you should be able to talk, but not sing.
• Strength: 2-3 days a week, working legs, arms and trunk (standing up from a chair, calf raises, lifting a water bottle).
• Start gently and progress little by little. If you have little reserve or fear falling, begin seated or with support; it counts just the same.

Signs to stop and seek advice: chest pain, dizziness, disproportionate breathlessness or palpitations. Always match the intensity to what your medical team has approved.`,
      body_ca: `La recomanació general per preparar-te combina exercici aeròbic i de força, adaptat al teu punt de partida.

• Aeròbic (caminar, bici estàtica): apunta a moure’t gairebé cada dia, fins a sumar uns 150 minuts a la setmana. Una bona guia d’intensitat és la "prova de la parla": hauries de poder parlar, però no cantar.
• Força: 2-3 dies per setmana, treballant cames, braços i tronc (aixecar-te d’una cadira, puntetes, elevacions amb una ampolla d’aigua).
• Comença suau i progressa a poc a poc. Si tens poca reserva o por de caure, comença assegut o amb suport; és igual de vàlid.

Senyals per parar i consultar: dolor al pit, mareig, falta d’aire desproporcionada o palpitacions. Ajusta sempre la intensitat al que el teu equip mèdic t’hagi autoritzat.`
    }
  ];

Reglas de oro: nunca hagas equilibrio sin un apoyo cerca, para si te mareas o te falta el aire, e hidrátate. La constancia importa mucho más que la intensidad.`,
      body_en: `If you tire quickly, have little strength or fear falling, start here. These are very safe exercises you can do seated or with support. If you can, do them with a relative.

SEATED ON A FIRM CHAIR (no wheels):
• Lift and straighten each leg: 10 times per leg.
• Seated marching (lifting knees alternately): 1-2 minutes.
• Open and close your arms, and raise them above your head: 10 times.

STANDING, WITH YOUR HANDS ON THE BACKREST:
• Stand up and sit down from the chair without using your hands: start with 5 and build up slowly.
• Rise on your toes: 10 times.
• Wall push-ups: 10 times.

Golden rules: never balance without a support nearby, stop if you feel dizzy or short of breath, and stay hydrated. Consistency matters far more than intensity.`,
      body_ca: `Si et canses ràpid, tens poca força o por de caure, comença per aquí. Són exercicis molt segurs que pots fer assegut o amb suport. Fes-los, si pots, acompanyat d’un familiar.

ASSEGUT EN UNA CADIRA FERMA (sense rodes):
• Aixecar i estirar cada cama: 10 vegades per cama.
• Marxa asseguda (aixecar genolls alternant): 1-2 minuts.
• Obrir i tancar els braços, i elevar-los per damunt del cap: 10 vegades.

DE PEU, AMB LES MANS RECOLZADES AL RESPATLLER:
• Aixecar-te i seure de la cadira sense fer servir les mans: comença amb 5 i puja a poc a poc.
• Posar-te de puntetes: 10 vegades.
• Flexions contra la paret: 10 vegades.

Regles d’or: mai facis equilibri sense un suport a prop, atura’t si et mareges o et falta l’aire, i hidrata’t. La constància importa molt més que la intensitat.`

      title_en: "Preventing confusion after surgery (delirium)",

      category: "cognitivo",
      cover: "",
      author: "Equipo de prehabilitación",
      date: "2026-01-06",
      body: `El delírium es un estado de confusión aguda que puede aparecer en los días posteriores a una cirugía, sobre todo en personas mayores o frágiles. Es frecuente y casi siempre temporal, pero conviene prevenirlo porque asusta mucho y puede retrasar la recuperación.

QUÉ AYUDA A PREVENIRLO (antes y después):
• Mantener la mente activa: lectura, pasatiempos, el juego de memoria de la app, conversación.
• Dormir bien y respetar el ritmo día/noche.
• Llevar gafas y audífonos si los usas (ver y oír bien reduce la desorientación).
• Hidratarse y comer adecuadamente.
• Revisar con tu médico los fármacos que pueden favorecerlo.

PARA LA FAMILIA, tras la operación: hablarle con calma, recordarle dónde está y qué día es, traer objetos familiares y acompañarle. Si notáis confusión, desorientación o cambios bruscos de comportamiento, avisad al personal sanitario: saben cómo manejarlo.`,
      body_en: `Delirium is a state of acute confusion that can appear in the days after surgery, especially in older or frail people. It is common and almost always temporary, but it is worth preventing because it is very frightening and can delay recovery.

WHAT HELPS PREVENT IT (before and after):
• Keeping the mind active: reading, hobbies, the app memory game, conversation.
• Sleeping well and respecting the day/night rhythm.
• Wearing glasses and hearing aids if you use them (seeing and hearing well reduces disorientation).
• Staying hydrated and eating properly.
• Reviewing with your doctor the drugs that may favour it.

FOR THE FAMILY, after the operation: speak calmly, remind them where they are and what day it is, bring familiar objects and keep them company. If you notice confusion, disorientation or sudden behaviour changes, tell the healthcare staff: they know how to handle it.`,
      body_ca: `El deliri és un estat de confusió aguda que pot aparèixer en els dies posteriors a una cirurgia, sobretot en persones grans o fràgils. És freqüent i gairebé sempre temporal, però convé prevenir-lo perquè fa molta por i pot endarrerir la recuperació.

QUÈ AJUDA A PREVENIR-LO (abans i després):
• Mantenir la ment activa: lectura, passatemps, el joc de memòria de l’app, conversa.
• Dormir bé i respectar el ritme dia/nit.
• Portar ulleres i audiòfons si en fas servir (veure i sentir bé redueix la desorientació).
• Hidratar-se i menjar adequadament.
• Revisar amb el teu metge els fàrmacs que poden afavorir-lo.

PER A LA FAMÍLIA, després de l’operació: parlar-li amb calma, recordar-li on és i quin dia és, portar objectes familiars i acompanyar-lo. Si noteu confusió, desorientació o canvis bruscos de comportament, aviseu el personal sanitari: saben com gestionar-ho.`

      body: `La desnutrición "silenciosa" es muy común y debilita la cicatrización y las defensas. Muchas personas frágiles no llegan a sus necesidades de proteína solo con la dieta, sobre todo si tienen poco apetito.

      body_en: `"Silent" malnutrition is very common and weakens healing and defenses. Many frail people do not reach their protein needs through diet alone, especially if they have little appetite.

FIRST, REAL FOOD. Prioritise high-value proteins: eggs, fish, lean meat, dairy (Greek yogurt, cheese, milk), legumes. Spread the protein across all meals, including breakfast.

TRICKS IF YOU EAT LITTLE: enrich dishes (powdered milk, egg, olive oil, grated cheese), eat little and often, and make the most of the times you feel more appetite.

ORAL NUTRITIONAL SUPPLEMENTS (ONS): these are shakes or preparations rich in protein and calories. They can be very useful, but they must be prescribed by your doctor or dietitian, who will choose the type and amount suitable for your case. Mention it at your appointment if you struggle to eat.`,

      author: "Equipo de prehabilitación",
      date: "2026-01-08",
      body: `Dos aspectos médicos marcan una gran diferencia en cómo toleras la cirugía:

ANEMIA (pocos glóbulos rojos o poco hierro). Llegar anémico a la cirugía aumenta el riesgo de necesitar transfusión y de complicaciones. A menudo se puede corregir en las semanas previas con hierro u otro tratamiento. Si te han dicho que tienes anemia o el hierro bajo, coméntalo cuanto antes en tu consulta.

POLIFARMACIA (tomar muchos medicamentos). Algunos fármacos deben mantenerse y otros suspenderse antes de la operación (por ejemplo, ciertos anticoagulantes o antidiabéticos). Nunca los cambies por tu cuenta.

LO MÁS ÚTIL QUE PUEDES HACER: llevar a la consulta de preanestesia una lista completa y actualizada de TODOS tus medicamentos (incluidos los de herbolario y los que compras sin receta) y de tus alergias. Puedes prepararla y descargarla desde la sección "Mi medicación y alergias" de esta app.`,
      body_en: `Two medical aspects make a big difference in how you tolerate surgery:

ANEMIA (few red blood cells or low iron). Arriving anemic to surgery increases the risk of needing a transfusion and of complications. It can often be corrected in the weeks before with iron or another treatment. If you have been told you have anemia or low iron, mention it as soon as possible at your appointment.

POLYPHARMACY (taking many medications). Some drugs must be continued and others stopped before the operation (for example, certain anticoagulants or antidiabetics). Never change them on your own.

THE MOST USEFUL THING YOU CAN DO: bring to the pre-anesthesia appointment a complete, up-to-date list of ALL your medications (including herbal and over-the-counter products) and your allergies. You can prepare and download it from the "My medication and allergies" section of this app.`,
      body_ca: `Dos aspectes mèdics marquen una gran diferència en com toleres la cirurgia:

ANÈMIA (pocs glòbuls vermells o poc ferro). Arribar anèmic a la cirurgia augmenta el risc de necessitar transfusió i de complicacions. Sovint es pot corregir en les setmanes prèvies amb ferro o un altre tractament. Si t’han dit que tens anèmia o el ferro baix, comenta-ho com més aviat millor a la teva consulta.

POLIFARMÀCIA (prendre molts medicaments). Alguns fàrmacs s’han de mantenir i altres suspendre abans de l’operació (per exemple, certs anticoagulants o antidiabètics). Mai els canviïs pel teu compte.

EL MÉS ÚTIL QUE POTS FER: portar a la consulta de preanestèsia una llista completa i actualitzada de TOTS els teus medicaments (inclosos els d’herbolari i els que compres sense recepta) i de les teves al·lèrgies. Pots preparar-la i descarregar-la des de la secció "La meva medicació i al·lèrgies" d’aquesta app.`

      body: `<p>El ayuno antes de una anestesia es importante porque, mientras estás dormido o sedado, el contenido del estómago podría pasar a los pulmones y causar complicaciones graves como una neumonía. Llegar con el estómago vacío hace que tu operación sea mucho más segura.</p>
<p>El objetivo de tu equipo de anestesia es que te operes en las condiciones más seguras y controladas posibles. El día de la cirugía, tu anestesista revisará contigo a qué hora fue tu última comida o bebida y confirmará si el ayuno es seguro.</p>
<p>Marca abajo tu situación y resaltaremos el apartado que más te interesa. Puedes abrir también el resto de apartados si quieres leerlos.</p>
<h4>¿Qué es un "líquido claro"?</h4>
<p>Son líquidos transparentes, sin pulpa ni grasa, a través de los cuales casi se puede ver. Por ejemplo:</p>
<ul><li>Agua y refrescos incoloros (tipo Sprite®, 7‑Up®, tónica, gaseosa sin limón).</li>
<li>Zumo de manzana o de uva sin pulpa.</li>
<li>Café o té solos (sin leche, crema ni sucedáneos).</li>
<li>Bebidas isotónicas claras (evita las de color rojo, azul o morado).</li></ul>
<h4>¿Qué NO es un líquido claro?</h4>
<p>Todo lo que sea espeso, con grasa o con "cuerpo": leche y lácteos, bebidas vegetales, batidos y smoothies, zumos espesos o con pulpa (como el de naranja), café o té con leche o crema, chocolate, gelatinas, bebidas proteicas y fórmulas de nutrición enteral.</p>`,
      body_en: `<p>Fasting before anaesthesia matters because, while you are asleep or sedated, the contents of your stomach could pass into your lungs and cause serious complications such as pneumonia. Arriving with an empty stomach makes your operation much safer.</p>
<p>Your anaesthesia team's goal is for you to have surgery in the safest, most controlled conditions possible. On the day of surgery, your anaesthetist will check with you when you last ate or drank and confirm whether your fast is safe.</p>
<p>Tick your situation below and we will highlight the section most relevant to you. You can also open the other sections if you want to read them.</p>
<h4>What is a "clear liquid"?</h4>
<p>They are transparent liquids, with no pulp or fat, that you can almost see through. For example:</p>
<ul><li>Water and colourless soft drinks (such as Sprite®, 7‑Up®, tonic, clear soda).</li>
<li>Apple or grape juice without pulp.</li>
<li>Black coffee or tea (no milk, cream or creamers).</li>
<li>Clear sports drinks (avoid red, blue or purple ones).</li></ul>
<h4>What is NOT a clear liquid?</h4>
<p>Anything thick, fatty or with "body": milk and dairy, plant-based drinks, milkshakes and smoothies, thick or pulpy juices (like orange juice), coffee or tea with milk or cream, chocolate, jelly, protein drinks and enteral nutrition formulas.</p>`,
      body_ca: `<p>El dejuni abans d'una anestèsia és important perquè, mentre estàs adormit o sedat, el contingut de l'estómac podria passar als pulmons i causar complicacions greus com una pneumònia. Arribar amb l'estómac buit fa que la teva operació sigui molt més segura.</p>
<p>L'objectiu del teu equip d'anestèsia és que t'operis en les condicions més segures i controlades possibles. El dia de la cirurgia, el teu anestesista revisarà amb tu a quina hora va ser el teu darrer àpat o beguda i confirmarà si el dejuni és segur.</p>
<p>Marca a sota la teva situació i destacarem l'apartat que més t'interessa. També pots obrir la resta d'apartats si vols llegir-los.</p>
<h4>Què és un "líquid clar"?</h4>
<p>Són líquids transparents, sense polpa ni greix, a través dels quals gairebé es pot veure. Per exemple:</p>
<ul><li>Aigua i refrescos incolors (tipus Sprite®, 7‑Up®, tònica, gasosa sense llimona).</li>
<li>Suc de poma o de raïm sense polpa.</li>
<li>Cafè o te sols (sense llet, crema ni succedanis).</li>
<li>Begudes isotòniques clares (evita les de color vermell, blau o morat).</li></ul>
<h4>Què NO és un líquid clar?</h4>
<p>Tot el que sigui espès, amb greix o amb "cos": llet i lactis, begudes vegetals, batuts i smoothies, sucs espessos o amb polpa (com el de taronja), cafè o te amb llet o crema, xocolata, gelatines, begudes proteiques i fórmules de nutrició enteral.</p>`

        body: `<p>Si no tienes diabetes ni problemas digestivos especiales, como norma general:</p>

<li><strong>Comida copiosa, grasa o con mucha proteína</strong> (carne, fritos): déjala antes todavía (habitualmente unas 8 horas antes).</li></ul>
<p>Además, puedes tomar una <strong>bebida rica en carbohidratos</strong> hasta 2 horas antes (una bebida comercial tipo Nutricia PreOp® o una mezcla de maltodextrina en agua). Puede ayudarte a disminuir el hambre, reducir la ansiedad y mantener la energía protegiendo tu musculatura.</p>
<p>Los horarios y cantidades exactos pueden variar: sigue siempre las indicaciones concretas de tu hospital.</p>
<h4>Vídeo explicativo para pacientes sin diabetes ni medicación tipo GLP‑1</h4>

        body_en: `<p>If you don't have diabetes or special digestive problems, as a general rule:</p>
<ul><li><strong>Clear liquids:</strong> allowed up to 2 hours before anaesthesia. Between 4 and 2 hours beforehand, have only a moderate amount.</li>
<li><strong>Light meals</strong> (toast, fruit, cereal): stop well in advance (usually about 6 hours before).</li>
<li><strong>Large, fatty or high-protein meals</strong> (meat, fried food): stop even earlier (usually about 8 hours before).</li></ul>
<p>You may also have a <strong>carbohydrate-rich drink</strong> up to 2 hours before (a commercial drink such as Nutricia PreOp® or a maltodextrin-in-water mix). It can help reduce hunger and anxiety and keep your energy up while protecting your muscles.</p>
<p>Exact times and amounts may vary: always follow your hospital's specific instructions.</p>
<h4>Explainer video for patients without diabetes or GLP‑1 medication</h4>
<p>Below you'll find a video explaining, step by step, how to fast if you don't have diabetes and don't take medication that slows stomach emptying. It will help you review the timings and answer the most common questions.</p>

        title_ca: "Si tens diabetis",
        body: `<p>Si tienes diabetes, el ayuno se adapta para <strong>evitar hipoglucemias</strong> (bajadas de azúcar), <strong>evitar descompensaciones</strong> del azúcar en sangre y mantener un aporte de carbohidratos controlado, según las indicaciones de tu equipo.</p>
<p><strong>Tiempos de ayuno:</strong> para los sólidos son similares a los de una persona sin diabetes (comida ligera y, con más antelación, comida copiosa), y los líquidos claros suelen permitirse hasta unas 2 horas antes, siempre según lo que te indique tu equipo médico.</p>
<h4>Tu medicación para la diabetes</h4>

        body_en: `<p>If you have diabetes, fasting is adapted to <strong>avoid hypoglycaemia</strong> (low blood sugar), <strong>avoid decompensation</strong> of blood sugar, and keep carbohydrate intake controlled, according to your team's instructions.</p>

      title: "Ejercicio antes de la cirugía: tu plan de prehabilitación física",

      body: `<p>La <strong>prehabilitación física</strong> consiste en preparar activamente tu cuerpo en las semanas previas a la cirugía para llegar con más fuerza, mejor capacidad cardiorrespiratoria y más reserva funcional. En pocas palabras: cuanto mejor llegues, mejor sueles recuperarte.</p>
<p>La evidencia disponible sugiere que el ejercicio antes de la cirugía <strong>puede reducir complicaciones y acelerar la recuperación</strong>, sobre todo cuando se combina con una buena nutrición y apoyo psicológico. La calidad de los estudios es variable, por lo que el plan debe <strong>individualizarse</strong> a tu situación.</p>
<h4>Los tres bloques de tu entrenamiento</h4>
<p>Un buen plan combina tres tipos de trabajo que se complementan:</p>
<ul><li><strong>Resistencia aeróbica:</strong> caminar es la base. Mejora tu corazón y tus pulmones. <em>(Al menos 3 días por semana.)</em></li>

<li><strong>Flexibilidad:</strong> estiramientos suaves para mantener la movilidad y reducir la rigidez, sin buscar dolor ni rangos máximos. <em>(A diario o al final de cada sesión.)</em></li></ul>
<p>El orden que mejor funciona en cada sesión es: <strong>calentamiento → bloque aeróbico → bloque de fuerza → vuelta a la calma con estiramientos</strong>.</p>
<p>Puedes hacer los tres bloques en <strong>la misma sesión</strong> (ese es el orden de arriba). El aeróbico puede ser casi diario; la fuerza necesita días de recuperación, así que los días sin fuerza basta con caminar y estirar.</p>
<h4>Principios</h4>
<ul><li><strong>Empieza pronto</strong> y sé constante: idealmente <strong>4-6 semanas antes</strong> de la cirugía, aunque cualquier tiempo suma. La regularidad importa más que la intensidad.</li>

<li>El objetivo no es "ponerte en forma" en semanas, sino llegar con <strong>mejor tolerancia al esfuerzo</strong> y menos pérdida funcional.</li>

<h4>Antes de empezar</h4>
<p>Consulta con tu equipo médico si tienes enfermedad del corazón o del pulmón, mareos, dolor en el pecho, tensión mal controlada u otras dudas. Pueden ajustar el plan a tu caso.</p>

<li>Dolor musculoesquelético relevante.</li></ul>`,
      body_en: `<p><strong>Physical prehabilitation</strong> means actively preparing your body in the weeks before surgery so you arrive stronger, with better cardiorespiratory fitness and more functional reserve. In short: the better you arrive, the better you tend to recover.</p>
<p>Available evidence suggests that exercise before surgery <strong>can reduce complications and speed up recovery</strong>, especially when combined with good nutrition and psychological support. Study quality varies, so the plan should be <strong>individualised</strong> to your situation.</p>
<h4>The three building blocks of your training</h4>
<p>A good plan combines three complementary types of work:</p>
<ul><li><strong>Aerobic endurance:</strong> walking is the foundation. It improves your heart and lungs. <em>(At least 3 days a week.)</em></li>
<li><strong>Strength:</strong> using your own body weight or light resistance (bands, bottles or small dumbbells). It preserves muscle mass and function. <em>(2-3 days a week, on non-consecutive days.)</em></li>
<li><strong>Flexibility:</strong> gentle stretching to keep mobility and reduce stiffness, never pushing into pain or maximum ranges. <em>(Daily or at the end of each session.)</em></li></ul>
<p>The sequence that works best in each session is: <strong>warm-up → aerobic block → strength block → cool-down with stretches</strong>.</p>
<p>You can do the three blocks in <strong>the same session</strong> (that's the order above). Aerobic work can be almost daily; strength needs recovery days, so on non-strength days just walking and stretching is enough.</p>
<h4>Principles</h4>
<ul><li><strong>Start early</strong> and be consistent: ideally <strong>4-6 weeks before</strong> surgery, though any amount of time helps. Regularity matters more than intensity.</li>
<li><strong>Progressive and safe</strong>: build up gradually, with good technique, resting when needed.</li>
<li><strong>Individualise:</strong> adapt the plan to your age, conditions, pain and starting fitness. If you are frail or very sedentary, even very short routines help when done consistently.</li>
<li>The goal is not to "get fit" in a few weeks, but to arrive with <strong>better exercise tolerance</strong> and less loss of function.</li>
<li>Consistency beats perfection: doing something almost every day is already useful.</li></ul>
<h4>Before you start</h4>
<p>Check with your medical team if you have heart or lung disease, dizziness, chest pain, poorly controlled blood pressure or other concerns. They can tailor the plan to you.</p>
<h4>Stop and seek advice if you have…</h4>
<ul><li>Chest pain or tightness.</li>
<li>Dizziness, faintness or palpitations.</li>
<li>Breathlessness out of proportion to the effort.</li>
<li>Significant musculoskeletal pain.</li></ul>`,

<p>Un bon pla combina tres tipus de treball que es complementen:</p>
<ul><li><strong>Resistència aeròbica:</strong> caminar és la base. Millora el cor i els pulmons. <em>(Almenys 3 dies per setmana.)</em></li>
<li><strong>Força:</strong> amb el teu propi pes o resistència lleugera (bandes, ampolles o manuelles petites). Preserva la massa muscular i la funcionalitat. <em>(2-3 dies per setmana, en dies no consecutius.)</em></li>
<li><strong>Flexibilitat:</strong> estiraments suaus per mantenir la mobilitat i reduir la rigidesa, sense buscar dolor ni rangs màxims. <em>(A diari o al final de cada sessió.)</em></li></ul>
<p>L'ordre que millor funciona en cada sessió és: <strong>escalfament → bloc aeròbic → bloc de força → tornada a la calma amb estiraments</strong>.</p>
<p>Pots fer els tres blocs en <strong>la mateixa sessió</strong> (aquest és l'ordre de dalt). L'aeròbic pot ser gairebé diari; la força necessita dies de recuperació, així que els dies sense força n'hi ha prou amb caminar i estirar.</p>
<h4>Principis</h4>
<ul><li><strong>Comença aviat</strong> i sigues constant: idealment <strong>4-6 setmanes abans</strong> de la cirurgia, encara que qualsevol temps suma. La regularitat importa més que la intensitat.</li>
<li><strong>Progressiu i segur</strong>: puja a poc a poc, cuidant la tècnica, amb descansos si cal.</li>
<li><strong>Individualitza:</strong> adapta el pla a la teva edat, malalties, dolor i forma física de partida. Si ets fràgil o molt sedentari, fins i tot rutines molt curtes ajuden si són constants.</li>
<li>L'objectiu no és "posar-te en forma" en setmanes, sinó arribar amb <strong>millor tolerància a l'esforç</strong> i menys pèrdua funcional.</li>
<li>La constància guanya a la perfecció: fer alguna cosa gairebé cada dia ja és útil.</li></ul>
<h4>Abans de començar</h4>
<p>Consulta amb el teu equip mèdic si tens malaltia del cor o del pulmó, marejos, dolor al pit, tensió mal controlada o altres dubtes. Poden ajustar el pla al teu cas.</p>
<h4>Atura't i consulta si apareix…</h4>
<ul><li>Dolor o opressió al pit.</li>
<li>Mareig, sensació de desmai o palpitacions.</li>
<li>Falta d'aire desproporcionada per a l'esforç.</li>
<li>Dolor musculoesquelètic rellevant.</li></ul>`
